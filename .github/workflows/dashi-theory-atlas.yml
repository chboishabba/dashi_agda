name: DASHI theory atlas

on:
  pull_request:
    paths:
      - "DASHI/**/*.agda"
      - "config/dashi-*-atlas.json"
      - "config/dashi-*-lane-hyperfabric.json"
      - "config/dashi-*-termflow.json"
      - "config/dashi-euler-phase-visualisations.json"
      - "scripts/materialize_dashi_theory_atlas.py"
      - "scripts/materialize_dashi_hyperfabric.py"
      - "scripts/materialize_dashi_lane_hyperfabric.py"
      - "scripts/materialize_dashi_agda_termflow.py"
      - "scripts/materialize_dashi_phase_visualisations.py"
      - "scripts/dashi_visualize_agda.py"
      - "tests/test_materialize_dashi_theory_atlas.py"
      - "tests/test_materialize_dashi_hyperfabric.py"
      - "tests/test_materialize_dashi_lane_hyperfabric.py"
      - "tests/test_materialize_dashi_agda_termflow.py"
      - "tests/test_materialize_dashi_phase_visualisations.py"
  push:
    branches: [master]
    paths:
      - "DASHI/**/*.agda"
      - "config/dashi-*-atlas.json"
      - "config/dashi-*-lane-hyperfabric.json"
      - "config/dashi-*-termflow.json"
      - "config/dashi-euler-phase-visualisations.json"
      - "scripts/materialize_dashi_theory_atlas.py"
      - "scripts/materialize_dashi_hyperfabric.py"
      - "scripts/materialize_dashi_lane_hyperfabric.py"
      - "scripts/materialize_dashi_agda_termflow.py"
      - "scripts/materialize_dashi_phase_visualisations.py"
      - "scripts/dashi_visualize_agda.py"
      - "tests/test_materialize_dashi_theory_atlas.py"
      - "tests/test_materialize_dashi_hyperfabric.py"
      - "tests/test_materialize_dashi_lane_hyperfabric.py"
      - "tests/test_materialize_dashi_agda_termflow.py"
      - "tests/test_materialize_dashi_phase_visualisations.py"

jobs:
  validate-atlas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Validate selected theorem declarations and graph
        run: python scripts/materialize_dashi_theory_atlas.py --check
      - name: Validate source-backed 369 hyperfabric extraction
        run: python scripts/materialize_dashi_hyperfabric.py --check
      - name: Run atlas and 369 regression tests
        run: python -m pytest -q tests/test_materialize_dashi_theory_atlas.py tests/test_materialize_dashi_hyperfabric.py
      - name: Materialise theorem atlas
        run: python scripts/materialize_dashi_theory_atlas.py --generated-at "1970-01-01T00:00:00+00:00"
      - name: Materialise 369 supervoxel hyperfabric
        run: python scripts/materialize_dashi_hyperfabric.py
      - name: Upload atlas and 369 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashi-atlas-and-369-visuals
          path: |
            artifacts/dashi-yang-mills-critical-path.json
            artifacts/dashi-yang-mills-critical-path.svg
            artifacts/dashi-369-supervoxel-hyperfabric.json
            artifacts/dashi-369-supervoxel-hyperfabric.svg

  validate-proof-lanes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Validate Yang-Mills proof-lane hyperfabric
        run: python scripts/materialize_dashi_lane_hyperfabric.py --config config/dashi-yang-mills-lane-hyperfabric.json --check
      - name: Validate Navier-Stokes proof-lane hyperfabric
        run: python scripts/materialize_dashi_lane_hyperfabric.py --config config/dashi-navier-stokes-lane-hyperfabric.json --check
      - name: Run proof-lane regression tests
        run: python -m pytest -q tests/test_materialize_dashi_lane_hyperfabric.py
      - name: Materialise Yang-Mills proof-lane hyperfabric
        run: python scripts/materialize_dashi_lane_hyperfabric.py --config config/dashi-yang-mills-lane-hyperfabric.json
      - name: Materialise Navier-Stokes proof-lane hyperfabric
        run: python scripts/materialize_dashi_lane_hyperfabric.py --config config/dashi-navier-stokes-lane-hyperfabric.json
      - name: Upload proof-lane visual artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashi-proof-lane-hyperfabrics
          path: |
            artifacts/dashi-yang-mills-lane-hyperfabric.json
            artifacts/dashi-yang-mills-lane-hyperfabric.svg
            artifacts/dashi-navier-stokes-lane-hyperfabric.json
            artifacts/dashi-navier-stokes-lane-hyperfabric.svg

  validate-termflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Compile generic term-flow generator
        run: python -m py_compile scripts/materialize_dashi_agda_termflow.py scripts/dashi_visualize_agda.py
      - name: Run generic term-flow regression tests
        run: python -m pytest -q tests/test_materialize_dashi_agda_termflow.py
      - name: Validate Yang-Mills term flow
        run: python scripts/dashi_visualize_agda.py --config config/dashi-yang-mills-termflow.json --check
      - name: Validate Navier-Stokes term flow
        run: python scripts/dashi_visualize_agda.py --config config/dashi-navier-stokes-termflow.json --check
      - name: Materialise Yang-Mills term-flow hyperfabric
        run: python scripts/dashi_visualize_agda.py --config config/dashi-yang-mills-termflow.json
      - name: Materialise Navier-Stokes term-flow hyperfabric
        run: python scripts/dashi_visualize_agda.py --config config/dashi-navier-stokes-termflow.json
      - name: Upload term-flow visual artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashi-agda-termflow-hyperfabrics
          path: |
            artifacts/dashi-yang-mills-termflow.json
            artifacts/dashi-yang-mills-termflow.svg
            artifacts/dashi-navier-stokes-termflow.json
            artifacts/dashi-navier-stokes-termflow.svg

  validate-phase-visualisations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Compile phase visualisation materialiser
        run: python -m py_compile scripts/materialize_dashi_phase_visualisations.py
      - name: Run phase visualisation regression tests
        run: python -m pytest -q tests/test_materialize_dashi_phase_visualisations.py
      - name: Validate source-backed Euler phase battery
        run: python scripts/materialize_dashi_phase_visualisations.py --config config/dashi-euler-phase-visualisations.json --check
      - name: Materialise Euler phase battery
        run: python scripts/materialize_dashi_phase_visualisations.py --config config/dashi-euler-phase-visualisations.json
      - name: Upload Euler phase visual artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashi-euler-phase-visualisation-battery
          path: |
            artifacts/dashi-euler-phase-battery.json
            artifacts/dashi-euler-phase-battery.svg
