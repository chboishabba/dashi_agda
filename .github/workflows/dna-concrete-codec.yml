name: DNA concrete codec

on:
  pull_request:
    paths:
      - 'DASHI/Codec/**'
      - 'DASHI/Interop/Codec**'
      - 'DASHI/Foundations/InvolutiveFibrePresentation.agda'
      - '.github/workflows/dna-concrete-codec.yml'
  workflow_dispatch:

jobs:
  agda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Agda and standard library
        run: |
          sudo apt-get update
          sudo apt-get install -y agda agda-stdlib
      - name: Locate standard library
        id: stdlib
        shell: bash
        run: |
          file="$(dpkg -L agda-stdlib | grep '/Data/Product.agda$' | head -n 1)"
          test -n "$file"
          echo "path=${file%/Data/Product.agda}" >> "$GITHUB_OUTPUT"
      - name: Typecheck aggregate codec target
        id: typecheck
        shell: bash
        run: |
          set +e
          agda -i . -i '${{ steps.stdlib.outputs.path }}' DASHI/Codec/DNAConcreteValidation.agda 2>&1 | tee agda-typecheck.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dna-concrete-agda-log
          path: agda-typecheck.log
          if-no-files-found: error
