name: Elementary single-operator extended

on:
  push:
    branches:
      - 'agent/eml-analytic-calculator-search-quantum'
    paths:
      - 'DASHI/Foundations/ElementarySingleOperator.agda'
      - 'DASHI/Foundations/EML*.agda'
      - 'DASHI/Foundations/ElementaryCalculator.agda'
      - 'DASHI/Foundations/Ternary*.agda'
      - 'DASHI/Foundations/SpectralCountingComplexity.agda'
      - 'DASHI/Foundations/DivergenceComparisonPackage.agda'
      - 'DASHI/Physics/NavierStokes/DissipationNullComputationalCarrier.agda'
      - 'DASHI/Algebra/Quantum/BraKet.agda'
      - 'DASHI/Algebra/Quantum/TernaryCircuit.agda'
      - 'DASHI/Promotion/FiniteTernaryQuantumCircuitAdapter.agda'
      - 'DASHI/Unified/StructuralComplexitySurvivalBundle.agda'
      - 'scripts/search_ternary_elementary_candidates.py'
      - 'scripts/check_elementary_single_operator_extended.py'
      - '.github/workflows/elementary-single-operator-extended.yml'
  pull_request:
    paths:
      - 'DASHI/Foundations/ElementarySingleOperator.agda'
      - 'DASHI/Foundations/EML*.agda'
      - 'DASHI/Foundations/ElementaryCalculator.agda'
      - 'DASHI/Foundations/Ternary*.agda'
      - 'DASHI/Foundations/SpectralCountingComplexity.agda'
      - 'DASHI/Foundations/DivergenceComparisonPackage.agda'
      - 'DASHI/Physics/NavierStokes/DissipationNullComputationalCarrier.agda'
      - 'DASHI/Algebra/Quantum/BraKet.agda'
      - 'DASHI/Algebra/Quantum/TernaryCircuit.agda'
      - 'DASHI/Promotion/FiniteTernaryQuantumCircuitAdapter.agda'
      - 'DASHI/Unified/StructuralComplexitySurvivalBundle.agda'
      - 'scripts/search_ternary_elementary_candidates.py'
      - 'scripts/check_elementary_single_operator_extended.py'
      - '.github/workflows/elementary-single-operator-extended.yml'
  workflow_dispatch:

jobs:
  audit-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit fail-closed source and scout lane
        run: python3 scripts/check_elementary_single_operator_extended.py
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Typecheck extended EML and structural-complexity tranche
        run: |
          nix develop --accept-flake-config --command bash -lc '
            set -euo pipefail
            AGDA="agda -i . -i DCHoTT-Agda -i cubical -l standard-library"
            $AGDA DASHI/Foundations/ElementarySingleOperator.agda
            $AGDA DASHI/Foundations/EMLAnalyticDomain.agda
            $AGDA DASHI/Foundations/EMLPositiveRealAnalyticPackage.agda
            $AGDA DASHI/Foundations/EMLComplexBranchPackage.agda
            $AGDA DASHI/Foundations/EMLConcreteSmokeModel.agda
            $AGDA DASHI/Foundations/ElementaryCalculator.agda
            $AGDA DASHI/Foundations/TernaryElementaryOperatorCandidate.agda
            $AGDA DASHI/Foundations/TernaryWitnessIndependentRepresentation.agda
            $AGDA DASHI/Foundations/TernaryElementarySearchCertificate.agda
            $AGDA DASHI/Foundations/SpectralCountingComplexity.agda
            $AGDA DASHI/Foundations/DivergenceComparisonPackage.agda
            $AGDA DASHI/Physics/NavierStokes/DissipationNullComputationalCarrier.agda
            $AGDA DASHI/Algebra/Quantum/BraKet.agda
            $AGDA DASHI/Algebra/Quantum/TernaryCircuit.agda
            $AGDA DASHI/Promotion/FiniteTernaryQuantumCircuitAdapter.agda
            $AGDA DASHI/Foundations/ElementarySingleOperatorExtendedRegression.agda
            $AGDA DASHI/Foundations/ElementarySingleOperatorBundle.agda
            $AGDA DASHI/Unified/StructuralComplexitySurvivalBundle.agda
          '
