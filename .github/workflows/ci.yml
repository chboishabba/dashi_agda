name: Agda CI

on:
  workflow_dispatch:
  push:
    branches:
      - agent/reflexive-clopen-psychology

permissions:
  contents: read
  statuses: write

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Agda + stdlib
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: "2.6.4.3"
          agda-stdlib-version: "2.1"

      - name: Show versions
        run: |
          agda --version

      - name: Typecheck (root module)
        run: |
          set -euxo pipefail
          agda -i . -l standard-library DASHI/Everything.agda | tee agda-typecheck.log

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agda-typecheck-log
          path: agda-typecheck.log

      - name: Publish successful Agda status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/statuses/${SHA}" \
            -d '{"state":"success","context":"Agda full root","description":"DASHI/Everything.agda typechecks"}'

      - name: Publish failed Agda status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/statuses/${SHA}" \
            -d '{"state":"failure","context":"Agda full root","description":"DASHI/Everything.agda typecheck failed"}'
