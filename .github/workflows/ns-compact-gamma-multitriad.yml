name: NS compact Gamma multi-triad audit

on:
  push:
    paths:
      - 'scripts/ns_compact_gamma_multitriad_evolved_audit.py'
      - 'scripts/tests/test_ns_compact_gamma_multitriad_evolved_audit.py'
      - 'DASHI/Physics/Closure/NSCompactGammaUniformFamilyResidence.agda'
      - 'docs/ns_compact_gamma_multitriad_evolved_audit.md'
      - '.github/workflows/ns-compact-gamma-multitriad.yml'
  pull_request:
    paths:
      - 'scripts/ns_compact_gamma_multitriad_evolved_audit.py'
      - 'scripts/tests/test_ns_compact_gamma_multitriad_evolved_audit.py'
      - 'DASHI/Physics/Closure/NSCompactGammaUniformFamilyResidence.agda'
      - 'docs/ns_compact_gamma_multitriad_evolved_audit.md'
      - '.github/workflows/ns-compact-gamma-multitriad.yml'

concurrency:
  group: ns-compact-gamma-multitriad-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  multitriad-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy pytest
      - name: Run focused tests
        run: >-
          python -m pytest -q
          scripts/tests/test_ns_compact_gamma_multitriad_evolved_audit.py
      - name: Run evolved shell and cutoff audit
        run: |
          python scripts/ns_compact_gamma_multitriad_evolved_audit.py \
            --output-json ns-compact-gamma-multitriad.json \
            --search-cutoff 24 \
            --verify-cutoffs 32,48,64 \
            --target-shells 2,3 \
            --triad-counts 2,4 \
            --phase-spreads 0.0,0.35 \
            --target-ratios 2.5 \
            --satellite-fraction 0.55 \
            --seeds 0,1 \
            --gamma-threshold 0.5 \
            --minimum-angular-participation 1.3 \
            --verify-count 1 \
            --end-parabolic-time 0.002 \
            --output-count 2 \
            --pretty
      - name: Require complete non-vacuous receipt
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('ns-compact-gamma-multitriad.json').read_text())
          assert data['configuration_count'] == 8, data
          assert data['search_row_count'] == 16, data
          assert data['selected_configuration_count'] == 1, data
          assert data['verification_row_count'] == 12, data
          assert data['dangerous_row_count'] > 0, data
          assert data['evolved_dangerous_row_count'] > 0, data
          assert data['maximum_relative_divergence_residual'] < 1e-10, data
          assert data['maximum_mechanism_balance_residual'] < 1e-9, data
          assert data['maximum_finite_difference_residual'] < 1e-5, data
          assert data['authority']['cutoff_shell_uniform_authority'] is False
          assert data['authority']['theorem_authority'] is False
          assert data['authority']['bkm_authority'] is False
          assert data['authority']['clay_authority'] is False
          assert data['authority']['promoted'] is False
          PY
      - name: Upload multi-triad receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-compact-gamma-multitriad
          path: ns-compact-gamma-multitriad.json
          if-no-files-found: error

  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: ns-compact-uniform-family-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}
      - name: Check uniform family residence reduction
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-compact-uniform-family.log"
            export AGDA_JOBS=1
            scripts/run_agda29_parallel_check.sh \
              DASHI/Physics/Closure/NSCompactGammaUniformFamilyResidence.agda
          ) > agda-compact-uniform-family.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 180 agda-compact-uniform-family.log
          exit 0
      - name: Upload Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-compact-uniform-family-agda-log
          path: agda-compact-uniform-family.log
          if-no-files-found: error
      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
