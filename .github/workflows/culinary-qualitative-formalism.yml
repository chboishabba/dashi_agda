name: Culinary qualitative formalism

on:
  push:
    paths:
      - 'DASHI/Culture/Cuisine/**'
      - '.github/workflows/culinary-qualitative-formalism.yml'
      - 'scripts/run_agda29_parallel_check.sh'
  pull_request:
    paths:
      - 'DASHI/Culture/Cuisine/**'
      - '.github/workflows/culinary-qualitative-formalism.yml'
      - 'scripts/run_agda29_parallel_check.sh'

concurrency:
  group: culinary-qualitative-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: culinary-qualitative-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}
      - name: Check focused cuisine aggregate with pinned Agda 2.9
        id: focused
        shell: bash
        run: |
          set +e
          (
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-culinary-formalism.log"
            export AGDA_JOBS=1
            scripts/run_agda29_parallel_check.sh \
              DASHI/Culture/Cuisine/Everything.agda
          ) > agda-culinary-formalism.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 200 agda-culinary-formalism.log
          exit 0
      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: culinary-qualitative-agda-log
          path: agda-culinary-formalism.log
          if-no-files-found: error
      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
