name: NS exact Galerkin coherence audit

on:
  push:
    paths:
      - 'scripts/ns_galerkin_coherence_core.py'
      - 'scripts/ns_hard_alignment_derivative.py'
      - 'scripts/ns_generate_matched_galerkin_trajectories.py'
      - 'scripts/ns_shell_pair_transfer_audit.py'
      - 'scripts/ns_run_matched_coherence_baseline.py'
      - 'scripts/ns_triad_gamma_gap_raw_hat_export_timed.py'
      - 'scripts/ns_attach_explicit_timeline.py'
      - 'scripts/ns_adaptive_checkpoint_plan.py'
      - 'scripts/ns_shell_angle_residence_audit.py'
      - 'scripts/ns_shell_angle_residence_audit_v2.py'
      - 'scripts/ns_packet_coherence_budget_audit.py'
      - 'scripts/ns_packet_coherence_budget_audit_v2.py'
      - 'scripts/ns_log_bmo_vorticity_direction_audit.py'
      - 'scripts/ns_log_bmo_vorticity_direction_audit_v2.py'
      - 'scripts/ns_multicutoff_coherence_validation.py'
      - 'scripts/tests/test_ns_shell_angle_residence_audit.py'
      - 'scripts/tests/test_ns_packet_coherence_budget_audit.py'
      - 'scripts/tests/test_ns_log_bmo_vorticity_direction_audit.py'
      - 'scripts/tests/test_ns_timeline_and_multicutoff.py'
      - 'docs/ns_exact_galerkin_coherence_audit.md'
      - 'docs/ns_exact_galerkin_coherence_baseline_results.md'
      - 'DASHI/Physics/Closure/NSNormalizedAlignmentBudgetDerivative.agda'
      - '.github/workflows/ns-shell-angle-residence-audit.yml'
  pull_request:
    paths:
      - 'scripts/ns_galerkin_coherence_core.py'
      - 'scripts/ns_hard_alignment_derivative.py'
      - 'scripts/ns_generate_matched_galerkin_trajectories.py'
      - 'scripts/ns_shell_pair_transfer_audit.py'
      - 'scripts/ns_run_matched_coherence_baseline.py'
      - 'scripts/ns_triad_gamma_gap_raw_hat_export_timed.py'
      - 'scripts/ns_attach_explicit_timeline.py'
      - 'scripts/ns_adaptive_checkpoint_plan.py'
      - 'scripts/ns_shell_angle_residence_audit.py'
      - 'scripts/ns_shell_angle_residence_audit_v2.py'
      - 'scripts/ns_packet_coherence_budget_audit.py'
      - 'scripts/ns_packet_coherence_budget_audit_v2.py'
      - 'scripts/ns_log_bmo_vorticity_direction_audit.py'
      - 'scripts/ns_log_bmo_vorticity_direction_audit_v2.py'
      - 'scripts/ns_multicutoff_coherence_validation.py'
      - 'scripts/tests/test_ns_shell_angle_residence_audit.py'
      - 'scripts/tests/test_ns_packet_coherence_budget_audit.py'
      - 'scripts/tests/test_ns_log_bmo_vorticity_direction_audit.py'
      - 'scripts/tests/test_ns_timeline_and_multicutoff.py'
      - 'docs/ns_exact_galerkin_coherence_audit.md'
      - 'docs/ns_exact_galerkin_coherence_baseline_results.md'
      - 'DASHI/Physics/Closure/NSNormalizedAlignmentBudgetDerivative.agda'
      - '.github/workflows/ns-shell-angle-residence-audit.yml'

concurrency:
  group: ns-exact-coherence-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-audits:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install focused dependencies
        run: python -m pip install --upgrade pip numpy pytest
      - name: Run focused tests
        run: |
          python -m pytest -q \
            scripts/tests/test_ns_shell_angle_residence_audit.py \
            scripts/tests/test_ns_packet_coherence_budget_audit.py \
            scripts/tests/test_ns_log_bmo_vorticity_direction_audit.py \
            scripts/tests/test_ns_timeline_and_multicutoff.py

  matched-cutoff-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install numerical dependency
        run: python -m pip install --upgrade pip numpy
      - name: Run matched N32 N48 N64 Galerkin baseline
        run: |
          python scripts/ns_run_matched_coherence_baseline.py \
            --cutoffs 32,48,64 \
            --workdir "$RUNNER_TEMP/ns-matched-baseline" \
            --output-json ns-matched-baseline.json \
            --end-time 0.001 \
            --output-dt 0.001
      - name: Require cutoff coverage and nonvacuous held-out execution
        run: |
          python - <<'PY'
          import json
          with open('ns-matched-baseline.json', encoding='utf-8') as handle:
              data = json.load(handle)
          validation = data['heldout_validation']
          assert validation['matched_cutoff_set_complete'], validation
          audits = validation['parameter_audits']
          assert any(a['nonvacuous_excursion_test'] for a in audits), validation
          assert validation['any_budget_coefficient_set_survives_holdout'], validation
          # The full danger=>depletion gate is a scientific result, not a CI
          # assumption. It may pass or be falsified; the receipt must record it.
          assert 'any_nonvacuous_parameter_set_survives_holdout' in validation
          PY
      - name: Upload matched baseline receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-matched-N32-N48-N64-baseline
          path: ns-matched-baseline.json
          if-no-files-found: error

  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: ns-exact-coherence-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}
      - name: Check exact quotient-rule module with Agda 2.9
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-exact-coherence-check.log"
            export AGDA_JOBS=2
            targets=(
              DASHI/Physics/Closure/NSNormalizedAlignmentBudgetDerivative.agda
              DASHI/Physics/Closure/NSCoherenceBudgetResidenceReduction.agda
            )
            scripts/run_agda29_parallel_check.sh "${targets[@]}"
          ) > agda-exact-coherence-check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 180 agda-exact-coherence-check.log
          exit 0
      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-exact-coherence-agda-log
          path: agda-exact-coherence-check.log
          if-no-files-found: error
      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
