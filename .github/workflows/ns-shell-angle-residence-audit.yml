name: NS shell-angle residence audit

on:
  push:
    paths:
      - 'scripts/ns_shell_angle_residence_audit.py'
      - 'scripts/tests/test_ns_shell_angle_residence_audit.py'
      - 'docs/ns_shell_angle_residence_audit.md'
      - '.github/workflows/ns-shell-angle-residence-audit.yml'
  pull_request:
    paths:
      - 'scripts/ns_shell_angle_residence_audit.py'
      - 'scripts/tests/test_ns_shell_angle_residence_audit.py'
      - 'docs/ns_shell_angle_residence_audit.md'
      - '.github/workflows/ns-shell-angle-residence-audit.yml'

permissions:
  contents: read

jobs:
  python-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install focused dependencies
        run: python -m pip install --upgrade pip numpy pytest
      - name: Run focused tests
        run: python -m pytest -q scripts/tests/test_ns_shell_angle_residence_audit.py
