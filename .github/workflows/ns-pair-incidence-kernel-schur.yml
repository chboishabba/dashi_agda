name: NS pair-incidence kernel Schur

on:
  pull_request:
    paths:
      - 'DASHI/Analysis/WeightedKernelSchurTest.agda'
      - 'DASHI/Analysis/FiniteWeightedKernelSums.agda'
      - 'DASHI/Physics/Closure/NSIntegerFourierLattice.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalModePacket.agda'
      - 'DASHI/Physics/Closure/NSWall1ExactEvaluationCarrier.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalPacketEvaluation.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalAmplitudeProfile.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalPolarizations.agda'
      - 'DASHI/Physics/Closure/NSDivergenceFreePolarizationBasis.agda'
      - 'DASHI/Physics/Closure/NSPairIncidenceKernel.agda'
      - 'DASHI/Physics/Closure/NSFourierBiotSavartTriadKernel.agda'
      - 'DASHI/Physics/Closure/NSWall1FourierShellInstance.agda'
      - 'DASHI/Physics/Closure/NSWall1PolarizationInstantiation.agda'
      - 'DASHI/Physics/Closure/NSWall1UniformWeightedSchur.agda'
      - 'DASHI/Physics/Closure/NSPairIncidenceSchurBridge.agda'
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketSchurSplit.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketWeightedKernelBridge.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketPairIncidenceKernelBridge.agda'
      - 'docs/ns_pair_incidence_kernel_schur.md'
      - '.github/workflows/ns-pair-incidence-kernel-schur.yml'
  push:
    paths:
      - 'DASHI/Analysis/WeightedKernelSchurTest.agda'
      - 'DASHI/Analysis/FiniteWeightedKernelSums.agda'
      - 'DASHI/Physics/Closure/NSIntegerFourierLattice.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalModePacket.agda'
      - 'DASHI/Physics/Closure/NSWall1ExactEvaluationCarrier.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalPacketEvaluation.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalAmplitudeProfile.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalPolarizations.agda'
      - 'DASHI/Physics/Closure/NSDivergenceFreePolarizationBasis.agda'
      - 'DASHI/Physics/Closure/NSPairIncidenceKernel.agda'
      - 'DASHI/Physics/Closure/NSFourierBiotSavartTriadKernel.agda'
      - 'DASHI/Physics/Closure/NSWall1FourierShellInstance.agda'
      - 'DASHI/Physics/Closure/NSWall1PolarizationInstantiation.agda'
      - 'DASHI/Physics/Closure/NSWall1UniformWeightedSchur.agda'
      - 'DASHI/Physics/Closure/NSPairIncidenceSchurBridge.agda'
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketSchurSplit.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketWeightedKernelBridge.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketPairIncidenceKernelBridge.agda'
      - 'docs/ns_pair_incidence_kernel_schur.md'
      - '.github/workflows/ns-pair-incidence-kernel-schur.yml'

concurrency:
  group: ns-pair-incidence-schur-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check pair-incidence Schur chain
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-ns-pair-incidence-schur.log"
            export AGDA_JOBS=1
            scripts/run_agda29_parallel_check.sh \
              DASHI/Analysis/WeightedKernelSchurTest.agda \
              DASHI/Analysis/FiniteWeightedKernelSums.agda \
              DASHI/Physics/Closure/NSIntegerFourierLattice.agda \
              DASHI/Physics/Closure/NSWall1CanonicalModePacket.agda \
              DASHI/Physics/Closure/NSWall1ExactEvaluationCarrier.agda \
              DASHI/Physics/Closure/NSWall1CanonicalPacketEvaluation.agda \
              DASHI/Physics/Closure/NSWall1CanonicalAmplitudeProfile.agda \
              DASHI/Physics/Closure/NSWall1CanonicalPolarizations.agda \
              DASHI/Physics/Closure/NSDivergenceFreePolarizationBasis.agda \
              DASHI/Physics/Closure/NSPairIncidenceKernel.agda \
              DASHI/Physics/Closure/NSFourierBiotSavartTriadKernel.agda \
              DASHI/Physics/Closure/NSWall1FourierShellInstance.agda \
              DASHI/Physics/Closure/NSWall1PolarizationInstantiation.agda \
              DASHI/Physics/Closure/NSWall1UniformWeightedSchur.agda \
              DASHI/Physics/Closure/NSPairIncidenceSchurBridge.agda \
              DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda \
              DASHI/Physics/Closure/NSCompactGammaOffPacketSchurSplit.agda \
              DASHI/Physics/Closure/NSCompactGammaOffPacketWeightedKernelBridge.agda \
              DASHI/Physics/Closure/NSCompactGammaOffPacketPairIncidenceKernelBridge.agda
          ) > agda-ns-pair-incidence-schur.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 340 agda-ns-pair-incidence-schur.log
          exit 0
      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-pair-incidence-schur-agda-log
          path: agda-ns-pair-incidence-schur.log
          if-no-files-found: error
      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
