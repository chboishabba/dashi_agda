name: NS compact Gamma differential modulus

on:
  push:
    paths:
      - 'scripts/ns_compact_gamma_differential_modulus_audit.py'
      - 'scripts/tests/test_ns_compact_gamma_differential_modulus_audit.py'
      - 'DASHI/Physics/Closure/NSCompactGammaDifferentialModulus.agda'
      - 'docs/ns_compact_gamma_differential_modulus_audit.md'
      - '.github/workflows/ns-compact-gamma-differential-modulus.yml'
  pull_request:
    paths:
      - 'scripts/ns_compact_gamma_differential_modulus_audit.py'
      - 'scripts/tests/test_ns_compact_gamma_differential_modulus_audit.py'
      - 'DASHI/Physics/Closure/NSCompactGammaDifferentialModulus.agda'
      - 'docs/ns_compact_gamma_differential_modulus_audit.md'
      - '.github/workflows/ns-compact-gamma-differential-modulus.yml'

concurrency:
  group: ns-compact-gamma-differential-modulus-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  differential-modulus-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy pytest
      - name: Run focused tests
        run: >-
          python -m pytest -q
          scripts/tests/test_ns_compact_gamma_differential_modulus_audit.py
      - name: Run exact differential-modulus audit
        id: audit
        shell: bash
        run: |
          set +e
          python scripts/ns_compact_gamma_differential_modulus_audit.py \
            --output-json ns-compact-gamma-differential-modulus.json \
            --search-cutoff 24 \
            --verify-cutoffs 32,48,64 \
            --target-shells 2,3 \
            --target-packet-energy 0.86 \
            --triad-counts 4 \
            --phase-spreads 0.0,0.5 \
            --target-ratios 1.25,2.5 \
            --satellite-fractions 0.55 \
            --center-seeds 1 \
            --calibration-seeds 2 \
            --holdout-seeds 3 \
            --samples-per-base 1 \
            --phase-jitter 0.8 \
            --log-ratio-jitter 0.5 \
            --log-satellite-jitter 0.35 \
            --gamma-threshold 0.5 \
            --path-parameters 0.0,0.5,1.0 \
            --tangent-kinds path,rhs \
            --times-per-profile 1 \
            --differential-slack 0.25 \
            --mechanism-relative-floor 1e-11 \
            --end-parabolic-time 0.004 \
            --output-count 3 \
            --verify-count 1 \
            --pretty > ns-compact-gamma-differential-modulus.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 220 ns-compact-gamma-differential-modulus.log
          exit 0
      - name: Require successful audit execution
        if: steps.audit.outputs.status != '0'
        run: exit 1
      - name: Validate receipt integrity
        if: steps.audit.outputs.status == '0'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('ns-compact-gamma-differential-modulus.json').read_text())
          assert data['schema_version'] == '1.0.0'
          assert data['center_profile_count'] == 8
          assert data['calibration_profile_count'] == 8
          assert data['holdout_profile_count'] == 8
          assert data['calibration_row_count'] > 0
          assert data['holdout_row_count'] > 0
          assert data['matched_profile_count'] == 6
          assert data['matched_row_count'] > 0
          assert data['matched_cutoff_groups']
          assert all(group['matched_cutoff_complete'] for group in data['matched_cutoff_groups'])
          assert data['maximum_mechanism_reconstruction_residual'] < 1e-8
          assert data['maximum_packet_energy_tangent_residual'] < 1e-8
          if data['maximum_gamma_finite_difference_residual'] is not None:
              assert data['maximum_gamma_finite_difference_residual'] < 1e-4
          if data['maximum_log_escape_finite_difference_residual'] is not None:
              assert data['maximum_log_escape_finite_difference_residual'] < 1e-3
          authority = data['authority']
          assert authority['exact_finite_galerkin_gamma_directional_derivative'] is True
          assert authority['exact_finite_galerkin_escape_directional_derivative_away_from_sign_kinks'] is True
          assert authority['analytic_cutoff_shell_uniform_gamma_modulus_proved'] is False
          assert authority['analytic_cutoff_shell_uniform_log_escape_modulus_proved'] is False
          assert authority['compact_path_coverage_proved'] is False
          assert authority['continuum_compactness_authority'] is False
          assert authority['theorem_authority'] is False
          assert authority['bkm_authority'] is False
          assert authority['clay_authority'] is False
          assert authority['promoted'] is False
          fitted = data['fitted_differential_constants']
          print({
              'finite_candidate': fitted['finite_candidate'],
              'unresolved_calibration_rows': fitted['unresolved_row_count'],
              'gamma_constant': fitted['fitted_gamma_constant'],
              'log_escape_constant': fitted['fitted_log_escape_constant'],
              'holdout_survives': authority['sampled_differential_modulus_survives_holdout'],
              'matched_survives': authority['sampled_differential_modulus_survives_matched_cutoffs'],
          })
          PY
      - name: Upload differential receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-compact-gamma-differential-modulus
          path: |
            ns-compact-gamma-differential-modulus.json
            ns-compact-gamma-differential-modulus.log
          if-no-files-found: warn

  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: ns-compact-differential-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}
      - name: Check differential modulus reduction
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-compact-differential.log"
            export AGDA_JOBS=1
            scripts/run_agda29_parallel_check.sh \
              DASHI/Physics/Closure/NSCompactGammaDifferentialModulus.agda
          ) > agda-compact-differential.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 180 agda-compact-differential.log
          exit 0
      - name: Upload Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-compact-differential-agda-log
          path: agda-compact-differential.log
          if-no-files-found: error
      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
