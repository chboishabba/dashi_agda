name: NS compact Gamma phase sweep

on:
  push:
    paths:
      - 'scripts/ns_compact_gamma_potential_audit.py'
      - 'scripts/ns_compact_gamma_adversarial_sweep.py'
      - 'scripts/tests/test_ns_compact_gamma_adversarial_sweep.py'
      - '.github/workflows/ns-compact-gamma-stress-sweep.yml'
  pull_request:
    paths:
      - 'scripts/ns_compact_gamma_potential_audit.py'
      - 'scripts/ns_compact_gamma_adversarial_sweep.py'
      - 'scripts/tests/test_ns_compact_gamma_adversarial_sweep.py'
      - '.github/workflows/ns-compact-gamma-stress-sweep.yml'

concurrency:
  group: ns-compact-gamma-sweep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  phase-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy pytest
      - name: Run focused tests
        run: python -m pytest -q scripts/tests/test_ns_compact_gamma_adversarial_sweep.py
      - name: Sweep phase and amplitude family
        run: |
          python scripts/ns_compact_gamma_adversarial_sweep.py \
            --output-json ns-compact-gamma-phase-sweep.json \
            --search-cutoff 16 \
            --verify-cutoffs 32,48,64 \
            --input-ratios 0.5,1.0,2.0 \
            --target-amplitudes 0.1,0.25,0.5 \
            --phase-count 12 \
            --gamma-threshold 0.5 \
            --verify-count 3 \
            --pretty
      - name: Require complete sweep receipt
        run: |
          python - <<'PY'
          import json
          with open('ns-compact-gamma-phase-sweep.json', encoding='utf-8') as handle:
              data = json.load(handle)
          assert data['search_row_count'] == 108, data
          assert data['dangerous_row_count'] > 0, data
          assert data['matched_adverse_candidates'], data
          assert data['maximum_finite_difference_residual'] < 1e-6, data
          assert 'universal_pointwise_implication_falsified' in data['authority']
          PY
      - name: Upload sweep receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-compact-gamma-phase-sweep
          path: ns-compact-gamma-phase-sweep.json
          if-no-files-found: error
