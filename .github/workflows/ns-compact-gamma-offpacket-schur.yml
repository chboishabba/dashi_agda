name: NS compact Gamma off-packet Schur tail

on:
  push:
    paths:
      - 'scripts/ns_compact_gamma_offpacket_schur_audit.py'
      - 'scripts/tests/test_ns_compact_gamma_offpacket_schur_audit.py'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketSchurSplit.agda'
      - 'docs/ns_compact_gamma_offpacket_schur_audit.md'
      - '.github/workflows/ns-compact-gamma-offpacket-schur.yml'
  pull_request:
    paths:
      - 'scripts/ns_compact_gamma_offpacket_schur_audit.py'
      - 'scripts/tests/test_ns_compact_gamma_offpacket_schur_audit.py'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketSchurSplit.agda'
      - 'docs/ns_compact_gamma_offpacket_schur_audit.md'
      - '.github/workflows/ns-compact-gamma-offpacket-schur.yml'

concurrency:
  group: ns-compact-gamma-offpacket-schur-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  offpacket-schur-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy pytest
      - name: Run focused tests
        run: >-
          python -m pytest -q
          scripts/tests/test_ns_compact_gamma_offpacket_schur_audit.py
      - name: Run exact off-packet Schur-tail audit
        id: audit
        shell: bash
        run: |
          set +e
          python scripts/ns_compact_gamma_offpacket_schur_audit.py \
            --output-json ns-compact-gamma-offpacket-schur.json \
            --search-cutoff 24 \
            --verify-cutoffs 32,48,64 \
            --target-shells 2,3 \
            --target-packet-energy 0.86 \
            --triad-counts 4 \
            --phase-spreads 0.0,0.5 \
            --target-ratios 1.25,2.5 \
            --satellite-fractions 0.55 \
            --center-seeds 1 \
            --calibration-seeds 2 \
            --holdout-seeds 3 \
            --samples-per-base 1 \
            --phase-jitter 0.8 \
            --log-ratio-jitter 0.5 \
            --log-satellite-jitter 0.35 \
            --gamma-threshold 0.5 \
            --path-parameters 0.5 \
            --tangent-kinds path,rhs \
            --times-per-profile 1 \
            --shell-exponents 0,0.25,0.5,1 \
            --angular-etas 0,0.5,1,2 \
            --tail-radii 1,2 \
            --schur-slack 0.25 \
            --end-parabolic-time 0.004 \
            --output-count 3 \
            --verify-count 1 \
            --pretty > ns-compact-gamma-offpacket-schur.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 220 ns-compact-gamma-offpacket-schur.log
          exit 0
      - name: Require successful audit execution
        if: steps.audit.outputs.status != '0'
        run: exit 1
      - name: Validate receipt integrity
        if: steps.audit.outputs.status == '0'
        run: |
          python - <<'PY'
          import json
          import math
          from pathlib import Path

          data = json.loads(Path('ns-compact-gamma-offpacket-schur.json').read_text())
          assert data['schema_version'] == '1.0.0'
          assert data['center_profile_count'] == 8
          assert data['calibration_profile_count'] == 8
          assert data['holdout_profile_count'] == 8
          assert data['calibration_row_count'] > 0
          assert data['holdout_row_count'] > 0
          assert data['matched_profile_count'] == 6
          assert data['matched_row_count'] > 0
          assert data['candidate_count'] == 32
          assert data['maximum_shell_derivative_reconstruction_residual'] < 1e-8
          assert data['maximum_shell_energy_reconstruction_residual'] < 1e-10
          assert data['maximum_off_derivative_finite_difference_residual'] < 1e-5
          assert data['maximum_mechanism_balance_residual'] < 1e-8
          assert data['maximum_packet_energy_tangent_residual'] < 1e-10
          authority = data['authority']
          assert authority['exact_finite_galerkin_offpacket_derivative'] is True
          assert authority['exact_reality_closed_shell_split'] is True
          assert authority['analytic_offpacket_schur_bound_proved'] is False
          assert authority['analytic_tail_absorption_proved'] is False
          assert authority['cutoff_shell_uniform_authority'] is False
          assert authority['continuum_compactness_authority'] is False
          assert authority['theorem_authority'] is False
          assert authority['bkm_authority'] is False
          assert authority['clay_authority'] is False
          assert authority['promoted'] is False
          selected = data['selected_candidate']
          if selected is not None:
              assert selected['full_chain_survives'] is True
              assert data['matched_cutoff_groups']
              assert all(group['matched_cutoff_complete'] for group in data['matched_cutoff_groups'])
          print({
              'surviving_candidate_count': data['surviving_candidate_count'],
              'selected_shell_exponent': None if selected is None else selected['shell_exponent'],
              'selected_angular_eta': None if selected is None else selected['angular_eta'],
              'selected_tail_radius': None if selected is None else selected['tail_radius'],
              'selected_constant': None if selected is None else selected['fitted_near_schur_constant'],
              'baseline_holdout_full': data['baseline_candidate']['holdout_evaluation']['maximum_full_quotient'],
          })
          PY
      - name: Upload off-packet Schur receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-compact-gamma-offpacket-schur
          path: |
            ns-compact-gamma-offpacket-schur.json
            ns-compact-gamma-offpacket-schur.log
          if-no-files-found: warn

  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: ns-compact-offpacket-schur-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}
      - name: Check off-packet Schur-tail composition
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-compact-offpacket-schur.log"
            export AGDA_JOBS=1
            scripts/run_agda29_parallel_check.sh \
              DASHI/Physics/Closure/NSCompactGammaOffPacketSchurSplit.agda
          ) > agda-compact-offpacket-schur.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 200 agda-compact-offpacket-schur.log
          exit 0
      - name: Upload Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-compact-offpacket-schur-agda-log
          path: agda-compact-offpacket-schur.log
          if-no-files-found: error
      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
