name: GR quantum proof terms

on:
  pull_request:
    paths:
      - 'DASHI/Unified/GRQuantum*.agda'
      - 'DASHI/Core/FiniteQuadraticMultiscale.agda'
      - 'DASHI/Geometry/FiniteCausalDiamond*.agda'
      - 'DASHI/Algebra/ConstructiveClifford.agda'
      - 'DASHI/Algebra/FiniteQuaternion*.agda'
      - 'DASHI/Algebra/Quantum/Finite*.agda'
      - 'DASHI/Physics/Closure/Proposition*.agda'
      - 'DASHI/Physics/Closure/FiniteRegionalSpectrum*.agda'
      - 'DASHI/Empirical/GRQuantumCorrespondenceBoundary.agda'
      - 'scripts/run_gr_quantum_finite_model_diagnostic.py'
      - 'tests/test_gr_quantum_finite_model_diagnostic.py'
      - '.github/workflows/gr-quantum-proof-terms.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  finite-diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run finite model diagnostic tests
        run: |
          python -m pip install --quiet --upgrade pip pytest
          pytest -q tests/test_gr_quantum_finite_model_diagnostic.py

      - name: Materialise finite model receipts
        run: |
          python scripts/run_gr_quantum_finite_model_diagnostic.py \
            --output-dir /tmp/gr-quantum-finite-model
          test -s /tmp/gr-quantum-finite-model/gr_quantum_finite_model_diagnostic.json
          test -s /tmp/gr-quantum-finite-model/gr_quantum_finite_model_diagnostic.md

      - name: Upload finite model receipts
        uses: actions/upload-artifact@v4
        with:
          name: gr-quantum-finite-model-receipts
          path: /tmp/gr-quantum-finite-model

  agda-typecheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Agda and standard library
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install \
            --yes --quiet agda-bin agda-stdlib >/tmp/agda-install.log
          agda --version

      - name: Type-check proposition-level GR quantum atlas
        run: |
          set +e
          agda \
            -i . \
            -i /usr/share/agda-stdlib \
            DASHI/Unified/GRQuantumProofTermAtlas.agda \
            >/tmp/gr-quantum-agda.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo '--- Agda diagnostic tail ---'
            tail -n 120 /tmp/gr-quantum-agda.log
            exit "$status"
          fi
          cat /tmp/gr-quantum-agda.log

      - name: Upload Agda diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gr-quantum-agda-diagnostic
          path: /tmp/gr-quantum-agda.log
          if-no-files-found: ignore
