name: Balaban finite one-step Agda check

on:
  pull_request:
    paths:
      - 'DASHI/Physics/YangMills/BalabanFiniteOneStep*.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2CMP98*.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2ConstraintMatrix.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2GaugeFixedConstraintSpace.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2ConstrainedMinimizer.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2KernelProjection.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2Wilson*.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2GaugeFixedHessian.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2RestrictedWilsonHessian.agda'
      - 'DASHI/Physics/YangMills/BalabanFiniteMatrixInverse.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2ConditionalCovarianceConcrete.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2SchurComplement.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2BlockCholeskyConcrete.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2GaussianNormalization.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2FiniteEffectiveAction.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2Polarization*.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2BetaCoefficientExtraction.agda'
      - 'DASHI/Physics/YangMills/BalabanRandomWalk*.agda'
      - 'DASHI/Physics/YangMills/BalabanGreenKernelDecayFinite.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2NonlinearCriticalPointMap.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2FiniteContractionRegion.agda'
      - 'DASHI/Physics/YangMills/BalabanBetaUniformityConjecture.agda'
      - 'DASHI/Physics/YangMills/BalabanDashenGrossConventionMap.agda'
      - 'DASHI/Physics/YangMills/BalabanBetaNormalizationCalibration.agda'
      - '.github/workflows/balaban-finite-frontier-agda.yml'

jobs:
  finite-frontier-agda:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Check finite one-step frontier with Agda 2.9
        id: agda
        shell: bash
        run: |
          set +e
          export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
          export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
          export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
          export AGDA_LOG_PATH="$GITHUB_WORKSPACE/balaban-finite-frontier.log"
          export AGDA_JOBS=4
          scripts/run_agda29_parallel_check.sh \
            DASHI/Physics/YangMills/BalabanFiniteOneStepFrontierBundle.agda \
            > /tmp/balaban-finite-frontier.log 2>&1
          status=$?
          tail -n 120 /tmp/balaban-finite-frontier.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload focused Agda log
        uses: actions/upload-artifact@v4
        with:
          name: balaban-finite-frontier-log
          path: /tmp/balaban-finite-frontier.log
      - name: Fail on Agda error
        if: steps.agda.outputs.status != '0'
        run: exit 1
