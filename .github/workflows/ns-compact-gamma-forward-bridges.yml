name: NS compact Gamma forward bridges

on:
  pull_request:
    paths:
      - 'DASHI/Analysis/FiniteWeightedKernelTransport.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalAmplitudeProfile.agda'
      - 'DASHI/Physics/Closure/NSWall1RationalScalarInstance.agda'
      - 'DASHI/Physics/Closure/NSWall1RationalPolarizationProofs.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalFiniteSchur.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalPairIncidenceSchur.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalFourierRestriction.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalUniformRestrictionSchur.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalResolventGap.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketTriadMajorization.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketTailDecayBridge.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketDifferentialModulusBridge.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaGalerkinLimitBridge.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaTimeIntegrabilityBridge.agda'
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - '.github/workflows/ns-compact-gamma-forward-bridges.yml'
  push:
    paths:
      - 'DASHI/Analysis/FiniteWeightedKernelTransport.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalAmplitudeProfile.agda'
      - 'DASHI/Physics/Closure/NSWall1RationalScalarInstance.agda'
      - 'DASHI/Physics/Closure/NSWall1RationalPolarizationProofs.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalFiniteSchur.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalPairIncidenceSchur.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalFourierRestriction.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalUniformRestrictionSchur.agda'
      - 'DASHI/Physics/Closure/NSWall1CanonicalResolventGap.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketTriadMajorization.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketTailDecayBridge.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOffPacketDifferentialModulusBridge.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaGalerkinLimitBridge.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaTimeIntegrabilityBridge.agda'
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - '.github/workflows/ns-compact-gamma-forward-bridges.yml'

concurrency:
  group: ns-compact-gamma-forward-bridges-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore Agda 2.9 shadow cache
        id: agda-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: ns-compact-gamma-forward-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}
      - name: Check compact-Gamma forward bridge chain
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-ns-compact-gamma-forward.log"
            export AGDA_JOBS=1
            scripts/run_agda29_parallel_check.sh \
              DASHI/Analysis/FiniteWeightedKernelTransport.agda \
              DASHI/Physics/Closure/NSWall1RationalScalarInstance.agda \
              DASHI/Physics/Closure/NSWall1RationalPolarizationProofs.agda \
              DASHI/Physics/Closure/NSWall1CanonicalFiniteSchur.agda \
              DASHI/Physics/Closure/NSWall1CanonicalPairIncidenceSchur.agda \
              DASHI/Physics/Closure/NSWall1CanonicalFourierRestriction.agda \
              DASHI/Physics/Closure/NSWall1CanonicalUniformRestrictionSchur.agda \
              DASHI/Physics/Closure/NSWall1CanonicalResolventGap.agda \
              DASHI/Physics/Closure/NSCompactGammaOffPacketTriadMajorization.agda \
              DASHI/Physics/Closure/NSCompactGammaOffPacketTailDecayBridge.agda \
              DASHI/Physics/Closure/NSCompactGammaOffPacketDifferentialModulusBridge.agda \
              DASHI/Physics/Closure/NSCompactGammaGalerkinLimitBridge.agda \
              DASHI/Physics/Closure/NSCompactGammaTimeIntegrabilityBridge.agda \
              DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda
          ) > agda-ns-compact-gamma-forward.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 420 agda-ns-compact-gamma-forward.log
          exit 0
      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-compact-gamma-forward-agda-log
          path: agda-ns-compact-gamma-forward.log
          if-no-files-found: error
      - name: Save Agda 2.9 shadow cache
        if: always() && steps.agda-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: ns-compact-gamma-forward-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}
      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
