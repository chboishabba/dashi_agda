name: PNF utterance invariant Agda check

on:
  push:
    paths:
      - 'DASHI/Cognition/Utterance/**'
      - 'Docs/PNFUtteranceInvariantDerivation.md'
      - '.github/workflows/pnf-utterance-invariant.yml'
  pull_request:
    paths:
      - 'DASHI/Cognition/Utterance/**'
      - 'Docs/PNFUtteranceInvariantDerivation.md'
      - '.github/workflows/pnf-utterance-invariant.yml'

concurrency:
  group: pnf-utterance-invariant-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: pnf-utterance-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}
      - name: Check layered utterance modules with Agda 2.9
        id: focused
        shell: bash
        run: |
          set +e
          (
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-pnf-utterance-check.log"
            export AGDA_JOBS=2
            targets=(
              DASHI/Cognition/Utterance/LayeredMeaningCore.agda
              DASHI/Cognition/Utterance/AdmissibilityGate.agda
              DASHI/Cognition/Utterance/YeGrievanceInvariantExample.agda
              DASHI/Cognition/Utterance/All.agda
            )
            scripts/run_agda29_parallel_check.sh "${targets[@]}"
          ) > agda-pnf-utterance-check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 180 agda-pnf-utterance-check.log
          exit 0
      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnf-utterance-invariant-agda-log
          path: agda-pnf-utterance-check.log
          if-no-files-found: error
      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
