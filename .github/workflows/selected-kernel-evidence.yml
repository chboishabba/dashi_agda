name: DASHI selected-kernel evidence check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'DASHI/Physics/Closure/SelectedShiftStrictDescent.agda'
      - 'DASHI/Physics/Closure/SelectedShiftScaleDefects.agda'
      - 'DASHI/Physics/Closure/SelectedKernelEvidenceRegression.agda'
      - 'DASHI/Codec/VerifiedFiniteTritCoder.agda'
      - 'DASHI/Physics/ConstantZeroModeContinuumTheorem.agda'
      - 'scripts/run_triadic_flagship_benchmark.py'
      - 'scripts/validate_multiscale_flagship_receipt.py'
      - 'Docs/formal/SelectedKernelEvidenceClosure.md'
      - '.github/workflows/selected-kernel-evidence.yml'

concurrency:
  group: selected-kernel-evidence-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Check benchmark syntax
        run: |
          python -m py_compile scripts/run_triadic_flagship_benchmark.py
          python -m py_compile scripts/validate_multiscale_flagship_receipt.py

      - name: Run held-out triadic flagship benchmark
        run: |
          mkdir -p artifacts
          python scripts/run_triadic_flagship_benchmark.py \
            --repeats 3 \
            --output artifacts/triadic_flagship_receipt.json

      - name: Validate flagship receipt
        run: |
          python scripts/validate_multiscale_flagship_receipt.py \
            artifacts/triadic_flagship_receipt.json \
            --output artifacts/triadic_flagship_validation.json

      - name: Upload benchmark receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triadic-flagship-benchmark-receipt
          path: artifacts/*.json
          if-no-files-found: error

  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: selected-kernel-evidence-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}

      - name: Check selected-kernel closure surfaces
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-selected-kernel-evidence.log"
            export AGDA_JOBS=4
            scripts/run_agda29_parallel_check.sh \
              DASHI/Physics/Closure/SelectedShiftStrictDescent.agda \
              DASHI/Physics/Closure/SelectedShiftScaleDefects.agda \
              DASHI/Codec/VerifiedFiniteTritCoder.agda \
              DASHI/Physics/ConstantZeroModeContinuumTheorem.agda \
              DASHI/Physics/Closure/SelectedKernelEvidenceRegression.agda
          ) > agda-selected-kernel-evidence.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 360 agda-selected-kernel-evidence.log
          exit 0

      - name: Upload Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selected-kernel-evidence-agda-log
          path: agda-selected-kernel-evidence.log
          if-no-files-found: error

      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
