name: Balaban finite one-step Python check

on:
  pull_request:
    paths:
      - 'experiments/yang_mills/balaban_one_step/**'
      - '.github/workflows/balaban-finite-one-step-python.yml'
  push:
    paths:
      - 'experiments/yang_mills/balaban_one_step/**'
      - '.github/workflows/balaban-finite-one-step-python.yml'

jobs:
  finite-one-step:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check numpy
      - name: Compile scripts
        working-directory: experiments/yang_mills/balaban_one_step
        run: python -m py_compile *.py
      - name: Run finite vertical-slice tests
        working-directory: experiments/yang_mills/balaban_one_step
        run: python -m unittest -v test_finite_one_step.py
      - name: Run executable vertical slice
        working-directory: experiments/yang_mills/balaban_one_step
        run: |
          mkdir -p /tmp/balaban-one-step
          python build_q_matrix.py --L 2 --block 2 --out /tmp/balaban-one-step/Q.npy
          python build_wilson_hessian.py --L 2 --Q /tmp/balaban-one-step/Q.npy --out /tmp/balaban-one-step/H.npy
          python constrained_covariance.py --H /tmp/balaban-one-step/H.npy --Q /tmp/balaban-one-step/Q.npy --out-prefix /tmp/balaban-one-step/c
          python finite_logdet.py --H /tmp/balaban-one-step/H.npy --Q /tmp/balaban-one-step/Q.npy --out /tmp/balaban-one-step/logdet.json
      - name: Run exact finite certificates
        working-directory: experiments/yang_mills/balaban_one_step
        run: |
          cat > /tmp/balaban-one-step/rational.json <<'JSON'
          {"matrix": [["2", "1/2"], ["1/2", "3"]]}
          JSON
          cat > /tmp/balaban-one-step/interval.json <<'JSON'
          {"matrix": [[["2", "21/10"], ["49/100", "51/100"]], [["49/100", "51/100"], ["3", "31/10"]]]}
          JSON
          python rational_ldlt_certificate.py --matrix /tmp/balaban-one-step/rational.json --out /tmp/balaban-one-step/rational-certificate.json
          python interval_ldlt_certificate.py --matrix /tmp/balaban-one-step/interval.json --out /tmp/balaban-one-step/interval-certificate.json
