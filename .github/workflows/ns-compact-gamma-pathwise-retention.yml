name: NS compact Gamma pathwise retention

on:
  push:
    paths:
      - 'scripts/ns_compact_gamma_pathwise_retention_audit.py'
      - 'scripts/ns_compact_gamma_pathwise_retention_driver.py'
      - 'scripts/tests/test_ns_compact_gamma_pathwise_retention_audit.py'
      - 'scripts/tests/test_ns_compact_gamma_pathwise_retention_driver.py'
      - 'DASHI/Physics/Closure/NSCompactGammaPathwiseModulusComposition.agda'
      - 'docs/ns_compact_gamma_pathwise_retention_audit.md'
      - '.github/workflows/ns-compact-gamma-pathwise-retention.yml'
  pull_request:
    paths:
      - 'scripts/ns_compact_gamma_pathwise_retention_audit.py'
      - 'scripts/ns_compact_gamma_pathwise_retention_driver.py'
      - 'scripts/tests/test_ns_compact_gamma_pathwise_retention_audit.py'
      - 'scripts/tests/test_ns_compact_gamma_pathwise_retention_driver.py'
      - 'DASHI/Physics/Closure/NSCompactGammaPathwiseModulusComposition.agda'
      - 'docs/ns_compact_gamma_pathwise_retention_audit.md'
      - '.github/workflows/ns-compact-gamma-pathwise-retention.yml'

concurrency:
  group: ns-compact-gamma-pathwise-retention-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pathwise-retention-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy pytest
      - name: Run focused tests
        run: >-
          python -m pytest -q
          scripts/tests/test_ns_compact_gamma_pathwise_retention_audit.py
          scripts/tests/test_ns_compact_gamma_pathwise_retention_driver.py
      - name: Run pathwise retention audit
        id: audit
        shell: bash
        run: |
          set +e
          python scripts/ns_compact_gamma_pathwise_retention_driver.py \
            --output-json ns-compact-gamma-pathwise-retention.json \
            --search-cutoff 24 \
            --verify-cutoffs 32,48,64 \
            --target-shells 2,3 \
            --target-packet-energy 0.86 \
            --triad-counts 4 \
            --phase-spreads 0.0,0.5 \
            --target-ratios 1.25,2.5 \
            --satellite-fractions 0.55 \
            --center-seeds 1 \
            --calibration-seeds 2 \
            --holdout-seeds 3 \
            --samples-per-base 1 \
            --calibration-jitter-scale 1.0 \
            --holdout-jitter-scale 1.0 \
            --phase-jitter 0.8 \
            --log-ratio-jitter 0.5 \
            --log-satellite-jitter 0.35 \
            --gamma-threshold 0.5 \
            --path-sample-count 4 \
            --modulus-slack 0.2 \
            --end-parabolic-time 0.004 \
            --output-count 3 \
            --verify-count 1 \
            --pretty > ns-compact-gamma-pathwise-retention.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 180 ns-compact-gamma-pathwise-retention.log
          exit 0
      - name: Require successful audit execution
        if: steps.audit.outputs.status != '0'
        run: exit 1
      - name: Validate receipt integrity
        if: steps.audit.outputs.status == '0'
        run: |
          python - <<'PY'
          import json
          import math
          from pathlib import Path

          data = json.loads(Path('ns-compact-gamma-pathwise-retention.json').read_text())
          assert data['schema_version'] == '1.0.0'
          assert data['center_profile_count'] == 8
          assert data['calibration_profile_count'] == 8
          assert data['holdout_profile_count'] == 8
          assert data['calibration_path_count'] > 0
          assert data['holdout_path_count'] > 0
          assert data['matched_profile_count'] == 6
          assert data['matched_path_count'] > 0
          fitted = data['fitted_path_constants']
          assert fitted['finite_candidate'] is True
          assert math.isfinite(fitted['fitted_gamma_lipschitz_constant'])
          assert math.isfinite(fitted['fitted_log_escape_lipschitz_constant'])
          assert data['matched_cutoff_groups']
          assert all(group['matched_cutoff_complete'] for group in data['matched_cutoff_groups'])
          assert data['maximum_mechanism_balance_residual'] < 1e-8
          assert data['maximum_finite_difference_residual'] < 1e-5
          assert data['maximum_path_normalization_residual'] < 1e-10
          authority = data['authority']
          assert authority['finite_galerkin_pathwise_retention_audit'] is True
          assert authority['analytic_pathwise_gamma_lipschitz_proved'] is False
          assert authority['analytic_pathwise_log_escape_lipschitz_proved'] is False
          assert authority['cutoff_shell_uniform_authority'] is False
          assert authority['continuum_compactness_authority'] is False
          assert authority['theorem_authority'] is False
          assert authority['bkm_authority'] is False
          assert authority['clay_authority'] is False
          assert authority['promoted'] is False
          print({
              'gamma_lipschitz': fitted['fitted_gamma_lipschitz_constant'],
              'log_escape_lipschitz': fitted['fitted_log_escape_lipschitz_constant'],
              'holdout_lower': data['holdout_evaluation']['candidate_member_lower'],
              'holdout_survives': authority['sampled_pathwise_modulus_survives_holdout'],
              'matched_survives': authority['sampled_pathwise_modulus_survives_matched_cutoffs'],
          })
          PY
      - name: Upload pathwise receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-compact-gamma-pathwise-retention
          path: |
            ns-compact-gamma-pathwise-retention.json
            ns-compact-gamma-pathwise-retention.log
          if-no-files-found: warn

  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: ns-compact-pathwise-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}
      - name: Check pathwise modulus composition
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-compact-pathwise.log"
            export AGDA_JOBS=1
            scripts/run_agda29_parallel_check.sh \
              DASHI/Physics/Closure/NSCompactGammaPathwiseModulusComposition.agda
          ) > agda-compact-pathwise.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 180 agda-compact-pathwise.log
          exit 0
      - name: Upload Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-compact-pathwise-agda-log
          path: agda-compact-pathwise.log
          if-no-files-found: error
      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
