name: DASHI fixed-point RG/CFT Agda check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'DASHI/Physics/Closure/FixedPointAnalyticRGTargets.agda'
      - 'DASHI/Physics/Closure/ShiftFinite*.agda'
      - 'DASHI/Physics/Closure/ShiftGF2*.agda'
      - 'DASHI/Physics/Closure/ShiftScalingDimensionReference.agda'
      - 'DASHI/Physics/Closure/ShiftPositionDependentOPEReference.agda'
      - 'DASHI/Physics/Closure/ShiftInhabitedDepthEnvelopeRG.agda'
      - 'DASHI/Physics/Closure/ShiftStressTensorConformalWardReference.agda'
      - 'DASHI/Physics/Closure/ShiftAnalyticRGCFTRouteReference.agda'
      - 'DASHI/Physics/Closure/ShiftFixedPointRGCFTHandoff.agda'
      - 'DASHI/Physics/Closure/Physical*.agda'
      - 'DASHI/Physics/Closure/ShiftPhysicalRGCFTHandoff.agda'
      - 'Docs/ShiftFixedPointRGCFTHandoff.md'
      - 'Docs/PhysicalRealComplexRGCFTRoute.md'
      - '.github/workflows/fixed-point-rg-cft-agda.yml'

concurrency:
  group: fixed-point-rg-cft-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: fixed-point-rg-cft-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}

      - name: Check fixed-point RG/CFT surfaces
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-fixed-point-rg-cft.log"
            export AGDA_JOBS=4
            scripts/run_agda29_parallel_check.sh \
              DASHI/Physics/Closure/ShiftFiniteNormedTangent.agda \
              DASHI/Physics/Closure/ShiftFiniteLocalOPECrossing.agda \
              DASHI/Physics/Closure/FixedPointAnalyticRGTargets.agda \
              DASHI/Physics/Closure/ShiftGF2BanachTangentReference.agda \
              DASHI/Physics/Closure/ShiftGF2FrechetGeneratorReference.agda \
              DASHI/Physics/Closure/ShiftScalingDimensionReference.agda \
              DASHI/Physics/Closure/ShiftPositionDependentOPEReference.agda \
              DASHI/Physics/Closure/ShiftInhabitedDepthEnvelopeRG.agda \
              DASHI/Physics/Closure/ShiftStressTensorConformalWardReference.agda \
              DASHI/Physics/Closure/ShiftAnalyticRGCFTRouteReference.agda \
              DASHI/Physics/Closure/ShiftFixedPointRGCFTHandoff.agda \
              DASHI/Physics/Closure/PhysicalRealComplexRGCFTRoute.agda \
              DASHI/Physics/Closure/PhysicalRGCFTEmpiricalAuthority.agda \
              DASHI/Physics/Closure/PhysicalRGCFTFullPhysicsBridge.agda \
              DASHI/Physics/Closure/ShiftPhysicalRGCFTHandoff.agda \
              DASHI/Physics/Closure/PhysicalRGCFTRouteSurface.agda
          ) > agda-fixed-point-rg-cft.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 360 agda-fixed-point-rg-cft.log
          exit 0

      - name: Upload Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixed-point-rg-cft-agda-log
          path: agda-fixed-point-rg-cft.log
          if-no-files-found: error

      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
