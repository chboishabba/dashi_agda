name: Triadic completion modules

on:
  pull_request:
    paths:
      - "DASHI/Algebra/TriadicFiniteArithmeticLaws.agda"
      - "DASHI/Algebra/TriadicDepthTwoDFTGroupBridge.agda"
      - "DASHI/Physics/Closure/TriadicEisensteinTransformationTheorem.agda"
      - "DASHI/Geometry/TriadicSpectralGenusOneCurve.agda"
      - "DASHI/Physics/Closure/TriadicConcreteAnalyticInstances.agda"
      - "DASHI/Physics/Closure/TriadicKraftMDLConsistency.agda"
      - "scripts/generate_triadic_arithmetic_laws.py"
      - "scripts/generate_triadic_depth_two_dft.py"
      - ".github/workflows/triadic-completion-modules.yml"
  push:
    branches:
      - agent/triadic-spectral-completion
    paths:
      - "DASHI/Algebra/TriadicFiniteArithmeticLaws.agda"
      - "DASHI/Algebra/TriadicDepthTwoDFTGroupBridge.agda"
      - "DASHI/Physics/Closure/TriadicEisensteinTransformationTheorem.agda"
      - "DASHI/Geometry/TriadicSpectralGenusOneCurve.agda"
      - "DASHI/Physics/Closure/TriadicConcreteAnalyticInstances.agda"
      - "DASHI/Physics/Closure/TriadicKraftMDLConsistency.agda"
      - "scripts/generate_triadic_arithmetic_laws.py"
      - "scripts/generate_triadic_depth_two_dft.py"
      - ".github/workflows/triadic-completion-modules.yml"
  workflow_dispatch:

concurrency:
  group: triadic-completion-modules-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arithmetic
            file: DASHI/Algebra/TriadicFiniteArithmeticLaws.agda
          - name: dft9
            file: DASHI/Algebra/TriadicDepthTwoCyclotomicDFT.agda
          - name: dft9-group
            file: DASHI/Algebra/TriadicDepthTwoDFTGroupBridge.agda
          - name: modular
            file: DASHI/Physics/Closure/TriadicEisensteinTransformationTheorem.agda
          - name: elliptic
            file: DASHI/Geometry/TriadicSpectralGenusOneCurve.agda
          - name: analytic
            file: DASHI/Physics/Closure/TriadicConcreteAnalyticInstances.agda
          - name: mdl
            file: DASHI/Physics/Closure/TriadicKraftMDLConsistency.agda
    name: typecheck-${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate finite proof sources
        run: |
          python scripts/generate_triadic_arithmetic_laws.py
          python scripts/generate_triadic_depth_two_dft.py
      - name: Install Agda + stdlib
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: "2.6.4.3"
          agda-stdlib-version: "2.1"
      - name: Typecheck ${{ matrix.file }}
        run: |
          set -o pipefail
          agda -i . -l standard-library "${{ matrix.file }}" 2>&1 | tee "${{ matrix.name }}.log"
      - name: Upload ${{ matrix.name }} log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: triadic-${{ matrix.name }}-log
          path: "${{ matrix.name }}.log"
