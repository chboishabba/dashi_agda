name: NS differentiated triad analytic leaf

on:
  pull_request:
    paths:
      - 'DASHI/Physics/Closure/NSDifferentiatedTriadAnalyticLeaf.agda'
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - 'docs/ns_differentiated_triad_analytic_leaf.md'
      - '.github/workflows/ns-differentiated-triad-analytic-leaf.yml'
  push:
    paths:
      - 'DASHI/Physics/Closure/NSDifferentiatedTriadAnalyticLeaf.agda'
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - 'docs/ns_differentiated_triad_analytic_leaf.md'
      - '.github/workflows/ns-differentiated-triad-analytic-leaf.yml'

concurrency:
  group: ns-differentiated-triad-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check differentiated triad chain
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-ns-differentiated-triad.log"
            export AGDA_JOBS=1
            scripts/run_agda29_parallel_check.sh \
              DASHI/Physics/Closure/NSDifferentiatedTriadAnalyticLeaf.agda \
              DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda
          ) > agda-ns-differentiated-triad.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 260 agda-ns-differentiated-triad.log
          exit 0
      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-differentiated-triad-agda-log
          path: agda-ns-differentiated-triad.log
          if-no-files-found: error
      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
