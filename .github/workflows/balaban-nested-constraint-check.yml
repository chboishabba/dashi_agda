name: Balaban nested constraint Agda check

on:
  push:
    branches:
      - codex/balaban-nested-constraint-minimum
      - codex/balaban-literal-lattice-operators
      - codex/balaban-literal-lattice-operators-clean
      - codex/balaban-su2-quaternion-carrier
      - codex/balaban-su2-quaternion-carrier-clean
  pull_request:
    paths:
      - 'DASHI/Physics/YangMills/Balaban*.agda'
      - '.github/workflows/balaban-nested-constraint-check.yml'

concurrency:
  group: balaban-focused-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check focused Yang-Mills modules with Agda 2.9
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            AGDA_BIN="$(nix build --impure --no-link --print-out-paths --expr '
              let
                agdaFlake = builtins.getFlake "github:agda/agda/6a5169a469d506ee848ad99ef574c3df8e329a02";
                package = agdaFlake.packages.${builtins.currentSystem}.debug;
                patched = package.overrideAttrs (_: { postInstall = ""; });
              in patched.bin
            ')/bin/agda"
            STDLIB_ROOT="$(mktemp -d)"
            git clone --depth=1 --branch experimental \
              https://github.com/agda/agda-stdlib.git "$STDLIB_ROOT"
            STDLIB_INCLUDE="$STDLIB_ROOT/src"
            CHECK_ROOT="$(mktemp -d)"
            AGDA_DATA_DIR="$("$AGDA_BIN" --print-agda-data-dir)"
            AGDA_DATA_ROOT="$(dirname "$(dirname "$(dirname "$(dirname "$AGDA_DATA_DIR")")")")"
            cp -a "$AGDA_DATA_ROOT/lib/prim" "$CHECK_ROOT/prim"
            PRIM_INCLUDE="$CHECK_ROOT/prim"
            cp -a "$GITHUB_WORKSPACE/DASHI" "$CHECK_ROOT/DASHI"
            "$AGDA_BIN" --version
            printf 'agda-stdlib %s\n' "$(git -C "$STDLIB_ROOT" rev-parse HEAD)"
            targets=(
              DASHI/Physics/YangMills/BalabanPeriodicLatticeBonds.agda
              DASHI/Physics/YangMills/BalabanPeriodicLatticePaths.agda
              DASHI/Physics/YangMills/BalabanPeriodicLatticeEnumeration.agda
              DASHI/Physics/YangMills/BalabanBlockedPeriodicLattice.agda
              DASHI/Physics/YangMills/BalabanPeriodicGaugeTransport.agda
              DASHI/Physics/YangMills/BalabanGaugeTransformationCovariance.agda
              DASHI/Physics/YangMills/BalabanPeriodicPlaquetteHolonomy.agda
              DASHI/Physics/YangMills/BalabanLatticeAdjointCovariantDerivative.agda
              DASHI/Physics/YangMills/BalabanLatticeCovariantDivergence.agda
              DASHI/Physics/YangMills/BalabanCovariantPathIntegral.agda
              DASHI/Physics/YangMills/BalabanLinearBlockPathAverage.agda
              DASHI/Physics/YangMills/BalabanCanonicalBlockPathSamples.agda
              DASHI/Physics/YangMills/BalabanBlockedLinearAverageMainTerm.agda
              DASHI/Physics/YangMills/BalabanPlaquetteCovariantDerivative.agda
              DASHI/Physics/YangMills/BalabanFiniteAdjointQuadraticForms.agda
              DASHI/Physics/YangMills/BalabanPenaltyMismatchQuadraticForm.agda
              DASHI/Physics/YangMills/BalabanRealRingSolverProbe.agda
              DASHI/Physics/YangMills/BalabanSU2QuaternionCarrier.agda
              DASHI/Physics/YangMills/BalabanSU2LieAlgebraCarrier.agda
              DASHI/Physics/YangMills/BalabanSU2AdjointInnerProduct.agda
              DASHI/Physics/YangMills/BalabanSU2LiteralOperatorInstances.agda
              DASHI/Physics/YangMills/BalabanSU2LieBracket.agda
              DASHI/Physics/YangMills/BalabanSU2AdjointPolynomialCalculus.agda
              DASHI/Physics/YangMills/BalabanSU2AdjointCubicReduction.agda
              DASHI/Physics/YangMills/BalabanSU2ReducedAdjointCalculus.agda
              DASHI/Physics/YangMills/BalabanSU2AdjointMatrixDeterminant.agda
              DASHI/Physics/YangMills/BalabanSU2ReducedAdjointDeterminantProduct.agda
              DASHI/Physics/YangMills/BalabanSU2ReducedAdjointAdjugate.agda
              DASHI/Physics/YangMills/BalabanSU2AdjointRotationDeterminant.agda
              DASHI/Physics/YangMills/BalabanSU2ReducedAdjointGaugeCovariance.agda
              DASHI/Physics/YangMills/BalabanSU2RadialAdjointOperator.agda
              DASHI/Physics/YangMills/BalabanSU2RadialAdjointComposition.agda
              DASHI/Physics/YangMills/BalabanSU2RadialAdjointInverse.agda
              DASHI/Physics/YangMills/BalabanSU2NestedRadialBlockPathTerm.agda
              DASHI/Physics/YangMills/BalabanNestedConstraintMinimum.agda
              DASHI/Physics/YangMills/BalabanConstrainedGaussianCarrierAlgebra.agda
              DASHI/Physics/YangMills/BalabanFiniteConstraintChain.agda
              DASHI/Physics/YangMills/BalabanFiniteConstraintCovariance.agda
              DASHI/Physics/YangMills/BalabanIntervalConstraintChain.agda
              DASHI/Physics/YangMills/BalabanIntervalConstraintCovariance.agda
              DASHI/Physics/YangMills/BalabanIntervalConstraintComposition.agda
              DASHI/Physics/YangMills/BalabanIntervalAdjointComposition.agda
              DASHI/Physics/YangMills/BalabanIntervalCompositionAlgebra.agda
              DASHI/Physics/YangMills/BalabanIntervalDeterminantAlgebra.agda
              DASHI/Physics/YangMills/BalabanBilateralIntervalBounds.agda
              DASHI/Physics/YangMills/BalabanIntervalMismatchBounds.agda
              DASHI/Physics/YangMills/BalabanInverseSquareIntervalIdentity.agda
              DASHI/Physics/YangMills/BalabanDeterminantToInverseSquareInterval.agda
              DASHI/Physics/YangMills/BalabanIntervalToPrefixBridge.agda
              DASHI/Physics/YangMills/BalabanDeterminantIntervalToPrefix.agda
              DASHI/Physics/YangMills/BalabanDeterminantIntervalToCMP122.agda
              DASHI/Physics/YangMills/BalabanLinearIntervalEnclosure.agda
              DASHI/Physics/YangMills/BalabanLinearInverseSquareEnclosure.agda
              DASHI/Physics/YangMills/BalabanCumulativeBlockCorrection.agda
              DASHI/Physics/YangMills/BalabanCumulativeBlockCorrectionComposition.agda
              DASHI/Physics/YangMills/BalabanCumulativeDeterminantInterval.agda
              DASHI/Physics/YangMills/BalabanCumulativeDeterminantToInverseSquare.agda
              DASHI/Physics/YangMills/BalabanCumulativeDeterminantToPrefix.agda
              DASHI/Physics/YangMills/BalabanCumulativeDeterminantToCMP122.agda
              DASHI/Physics/YangMills/BalabanBlockDeterminantProduct.agda
              DASHI/Physics/YangMills/BalabanBlockDeterminantLogAdditivity.agda
              DASHI/Physics/YangMills/BalabanVacuumSubtractionAlgebra.agda
              DASHI/Physics/YangMills/BalabanVacuumSubtractedBlockDeterminant.agda
              DASHI/Physics/YangMills/BalabanProjectionIntervalLinearity.agda
              DASHI/Physics/YangMills/BalabanProjectedEndpointDifference.agda
              DASHI/Physics/YangMills/BalabanProjectedBlockCorrection.agda
              DASHI/Physics/YangMills/BalabanProjectedBlockBetaIdentity.agda
              DASHI/Physics/YangMills/BalabanProjectedBlockToCMP122.agda
              DASHI/Physics/YangMills/BalabanProjectedBlockToInverseSquare.agda
              DASHI/Physics/YangMills/BalabanEndpointBasisChangeCancellation.agda
              DASHI/Physics/YangMills/BalabanConstrainedKKTLinearisation.agda
              DASHI/Physics/YangMills/BalabanConstrainedEnvelopeHessian.agda
            )
            for target in "${targets[@]}"; do
              echo "Checking: $target"
              "$AGDA_BIN" --no-libraries --no-default-libraries -j0 \
                -i "$PRIM_INCLUDE" -i "$CHECK_ROOT" -i "$STDLIB_INCLUDE" \
                "$CHECK_ROOT/$target"
            done
          ) > agda-focused-check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 180 agda-focused-check.log
          exit 0

      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: balaban-focused-agda-log
          path: agda-focused-check.log
          if-no-files-found: error

      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1