name: NS exact compact-Gamma mathematical cutset

on:
  pull_request:
    paths:
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - 'DASHI/Physics/Closure/NSCompactGamma*.agda'
      - 'DASHI/Physics/Closure/NSPeriodic*.agda'
      - 'DASHI/Physics/Closure/NSClaySubmissionReadinessGate.agda'
      - 'scripts/ns_*.py'
      - 'scripts/check_ns_*.py'
      - 'scripts/data/outputs/ns_*.json'
      - 'scripts/data/outputs/check_ns_*.json'
      - '.github/workflows/ns-concrete-bernstein-envelope-domain.yml'
  push:
    paths:
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - 'DASHI/Physics/Closure/NSCompactGamma*.agda'
      - 'DASHI/Physics/Closure/NSPeriodic*.agda'
      - 'DASHI/Physics/Closure/NSClaySubmissionReadinessGate.agda'
      - 'scripts/ns_*.py'
      - 'scripts/check_ns_*.py'
      - 'scripts/data/outputs/ns_*.json'
      - 'scripts/data/outputs/check_ns_*.json'
      - '.github/workflows/ns-concrete-bernstein-envelope-domain.yml'

concurrency:
  group: ns-exact-compact-gamma-cutset-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  finite-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install numerical dependency
        run: python -m pip install --disable-pip-version-check numpy
      - name: Audit no-placeholder and fail-closed theorem surface
        run: python scripts/check_ns_periodic_program_surface.py
      - name: Audit official norm, expenditure, and coverage surface
        run: python scripts/check_ns_official_completion_surface.py
      - name: Reproduce official completion ledger
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ns-official-completion"
          python scripts/ns_official_completion_ledger.py \
            --output-json "$RUNNER_TEMP/ns-official-completion/ledger.json"
          python scripts/check_ns_official_completion_ledger.py \
            --source-json "$RUNNER_TEMP/ns-official-completion/ledger.json" \
            --output-json "$RUNNER_TEMP/ns-official-completion/check.json"
          diff -u scripts/data/outputs/ns_official_completion_ledger.json \
            "$RUNNER_TEMP/ns-official-completion/ledger.json"
          diff -u scripts/data/outputs/check_ns_official_completion_ledger.json \
            "$RUNNER_TEMP/ns-official-completion/check.json"
      - name: Reproduce seven analytic leaf ledger
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ns-seven-analytic-leaves"
          python scripts/ns_seven_analytic_leaf_ledger.py \
            --output-json "$RUNNER_TEMP/ns-seven-analytic-leaves/ledger.json"
          python scripts/check_ns_seven_analytic_leaf_ledger.py \
            --source-json "$RUNNER_TEMP/ns-seven-analytic-leaves/ledger.json" \
            --output-json "$RUNNER_TEMP/ns-seven-analytic-leaves/check.json"
          diff -u scripts/data/outputs/ns_seven_analytic_leaf_ledger.json \
            "$RUNNER_TEMP/ns-seven-analytic-leaves/ledger.json"
          diff -u scripts/data/outputs/check_ns_seven_analytic_leaf_ledger.json \
            "$RUNNER_TEMP/ns-seven-analytic-leaves/check.json"
      - name: Reproduce common normalized parameter tuple certificate
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ns-common-normalized-tuple"
          python scripts/ns_common_normalized_parameter_tuple_certificate.py \
            --output-json "$RUNNER_TEMP/ns-common-normalized-tuple/certificate.json"
          python scripts/check_ns_common_normalized_parameter_tuple_certificate.py \
            --source-json "$RUNNER_TEMP/ns-common-normalized-tuple/certificate.json" \
            --output-json "$RUNNER_TEMP/ns-common-normalized-tuple/check.json"
          diff -u scripts/data/outputs/ns_common_normalized_parameter_tuple_certificate.json \
            "$RUNNER_TEMP/ns-common-normalized-tuple/certificate.json"
          diff -u scripts/data/outputs/check_ns_common_normalized_parameter_tuple_certificate.json \
            "$RUNNER_TEMP/ns-common-normalized-tuple/check.json"
      - name: Reproduce finite falsification audit
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ns-compact-gamma-audit"
          python scripts/ns_compact_gamma_exact_cutset_audit.py \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/audit.json" --pretty
          python scripts/check_ns_compact_gamma_exact_cutset_audit.py \
            --source-json "$RUNNER_TEMP/ns-compact-gamma-audit/audit.json" \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/check.json"
          diff -u scripts/data/outputs/ns_compact_gamma_exact_cutset_audit.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/audit.json"
          diff -u scripts/data/outputs/check_ns_compact_gamma_exact_cutset_audit.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/check.json"
      - name: Reproduce exact finite-core certificate and tail obligations
        run: |
          set -euo pipefail
          python scripts/ns_compact_gamma_certificate_generator.py \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/certificate.json" \
            --radius 4 --R 8 --pretty
          python scripts/check_ns_compact_gamma_certificate_bundle.py \
            --source-json "$RUNNER_TEMP/ns-compact-gamma-audit/certificate.json" \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/certificate-check.json"
          diff -u scripts/data/outputs/ns_compact_gamma_certificate_bundle.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/certificate.json"
          diff -u scripts/data/outputs/check_ns_compact_gamma_certificate_bundle.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/certificate-check.json"
      - name: Reproduce concrete carrier proof-and-falsification program
        run: |
          set -euo pipefail
          python scripts/ns_periodic_concrete_proof_program.py \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/concrete-program.json"
          python scripts/check_ns_periodic_concrete_proof_program.py \
            --source-json "$RUNNER_TEMP/ns-compact-gamma-audit/concrete-program.json" \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/concrete-program-check.json"
          diff -u scripts/data/outputs/ns_periodic_concrete_proof_program.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/concrete-program.json"
          diff -u scripts/data/outputs/check_ns_periodic_concrete_proof_program.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/concrete-program-check.json"
      - name: Reproduce independent phase receipts
        run: |
          set -euo pipefail
          phase="$RUNNER_TEMP/ns-compact-gamma-audit/phases"
          mkdir -p "$phase"
          python scripts/ns_radius8_far_low_exhaustive.py --output-json "$phase/far_low.json"
          python scripts/ns_radius8_full_operator.py --output-json "$phase/full_operator.json" --K 2 --R 2
          python scripts/ns_radius8_multiplier_scaling.py --output-json "$phase/multiplier.json"
          python scripts/ns_radius8_far_high_scan.py --output-json "$phase/far_high.json"
          python scripts/ns_near_triad_budget_scan.py --output-json "$phase/near.json"
          python scripts/ns_near_triad_full_factor_scan.py --output-json "$phase/near_full.json"
          python scripts/ns_five_halves_falsification.py --output-json "$phase/five.json"
          python scripts/ns_five_halves_galerkin_trajectory.py --output-json "$phase/trajectory.json"
          python scripts/ns_boundary_face_search.py --output-json "$phase/boundary.json"
          python scripts/ns_boundary_face_galerkin_search.py --output-json "$phase/boundary_galerkin.json"
          python scripts/ns_adaptive_chart_coverage_scan.py --output-json "$phase/coverage.json"
          python scripts/check_ns_periodic_phase_receipts.py \
            --inputs "$phase/boundary.json" "$phase/boundary_galerkin.json" \
              "$phase/coverage.json" "$phase/far_high.json" "$phase/far_low.json" \
              "$phase/full_operator.json" "$phase/multiplier.json" \
              "$phase/five.json" "$phase/trajectory.json" \
              "$phase/near.json" "$phase/near_full.json" \
            --output-json "$phase/check.json"
          python scripts/check_ns_galerkin_falsifications.py \
            --trajectory-json "$phase/trajectory.json" \
            --boundary-json "$phase/boundary_galerkin.json" \
            --output-json "$phase/galerkin-check.json"
          python scripts/check_ns_harmonic_phase_results.py \
            --multiplier-json "$phase/multiplier.json" \
            --full-operator-json "$phase/full_operator.json" \
            --near-json "$phase/near_full.json" \
            --output-json "$phase/harmonic-check.json"
          diff -u scripts/data/outputs/ns_radius8_far_low_exhaustive.json "$phase/far_low.json"
          diff -u scripts/data/outputs/ns_radius8_full_operator.json "$phase/full_operator.json"
          diff -u scripts/data/outputs/ns_radius8_multiplier_scaling.json "$phase/multiplier.json"
          diff -u scripts/data/outputs/ns_radius8_far_high_scan.json "$phase/far_high.json"
          diff -u scripts/data/outputs/ns_near_triad_budget_scan.json "$phase/near.json"
          diff -u scripts/data/outputs/ns_near_triad_full_factor_scan.json "$phase/near_full.json"
          diff -u scripts/data/outputs/ns_five_halves_falsification.json "$phase/five.json"
          diff -u scripts/data/outputs/ns_five_halves_galerkin_trajectory.json "$phase/trajectory.json"
          diff -u scripts/data/outputs/ns_boundary_face_search.json "$phase/boundary.json"
          diff -u scripts/data/outputs/ns_boundary_face_galerkin_search.json "$phase/boundary_galerkin.json"
          diff -u scripts/data/outputs/ns_adaptive_chart_coverage_scan.json "$phase/coverage.json"
          diff -u scripts/data/outputs/check_ns_periodic_phase_receipts.json "$phase/check.json"
          diff -u scripts/data/outputs/check_ns_galerkin_falsifications.json "$phase/galerkin-check.json"
          diff -u scripts/data/outputs/check_ns_harmonic_phase_results.json "$phase/harmonic-check.json"

  boundary-face-matrix:
    needs: finite-audit
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        face:
          - gamma_floor
          - packet_energy_floor
          - packet_fraction_floor
          - off_packet_ceiling
          - size_ceiling
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install numerical dependency
        run: python -m pip install --disable-pip-version-check numpy
      - name: Run constrained boundary face
        run: |
          set -euo pipefail
          python scripts/ns_boundary_face_matrix_entry.py \
            --face "${{ matrix.face }}" \
            --output-json "$RUNNER_TEMP/${{ matrix.face }}.json"

  focused-agda:
    needs: [finite-audit, boundary-face-matrix]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check universal periodic-Fourier reductions and official completion program
        shell: bash
        run: |
          set -euo pipefail
          export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
          export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
          export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
          export AGDA_JOBS=1
          scripts/run_agda29_parallel_check.sh \
            DASHI/Physics/Closure/NSCompactGammaConcreteBernsteinEnvelopeDomainTest.agda
