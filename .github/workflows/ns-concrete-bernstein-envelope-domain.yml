name: NS exact compact-Gamma mathematical cutset

on:
  pull_request:
    paths:
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - 'DASHI/Physics/Closure/NSCompactGamma*.agda'
      - 'DASHI/Physics/Closure/NSPeriodic*.agda'
      - 'DASHI/Physics/Closure/NSClaySubmissionReadinessGate.agda'
      - 'scripts/ns_compact_gamma_exact_cutset_audit.py'
      - 'scripts/check_ns_compact_gamma_exact_cutset_audit.py'
      - 'scripts/ns_compact_gamma_certificate_generator.py'
      - 'scripts/check_ns_compact_gamma_certificate_bundle.py'
      - 'scripts/ns_periodic_concrete_proof_program.py'
      - 'scripts/check_ns_periodic_concrete_proof_program.py'
      - 'scripts/data/outputs/ns_compact_gamma_exact_cutset_audit.json'
      - 'scripts/data/outputs/check_ns_compact_gamma_exact_cutset_audit.json'
      - 'scripts/data/outputs/ns_compact_gamma_certificate_bundle.json'
      - 'scripts/data/outputs/check_ns_compact_gamma_certificate_bundle.json'
      - 'scripts/data/outputs/ns_periodic_concrete_proof_program.json'
      - 'scripts/data/outputs/check_ns_periodic_concrete_proof_program.json'
      - '.github/workflows/ns-concrete-bernstein-envelope-domain.yml'
  push:
    paths:
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - 'DASHI/Physics/Closure/NSCompactGamma*.agda'
      - 'DASHI/Physics/Closure/NSPeriodic*.agda'
      - 'DASHI/Physics/Closure/NSClaySubmissionReadinessGate.agda'
      - 'scripts/ns_compact_gamma_exact_cutset_audit.py'
      - 'scripts/check_ns_compact_gamma_exact_cutset_audit.py'
      - 'scripts/ns_compact_gamma_certificate_generator.py'
      - 'scripts/check_ns_compact_gamma_certificate_bundle.py'
      - 'scripts/ns_periodic_concrete_proof_program.py'
      - 'scripts/check_ns_periodic_concrete_proof_program.py'
      - 'scripts/data/outputs/ns_compact_gamma_exact_cutset_audit.json'
      - 'scripts/data/outputs/check_ns_compact_gamma_exact_cutset_audit.json'
      - 'scripts/data/outputs/ns_compact_gamma_certificate_bundle.json'
      - 'scripts/data/outputs/check_ns_compact_gamma_certificate_bundle.json'
      - 'scripts/data/outputs/ns_periodic_concrete_proof_program.json'
      - 'scripts/data/outputs/check_ns_periodic_concrete_proof_program.json'
      - '.github/workflows/ns-concrete-bernstein-envelope-domain.yml'

concurrency:
  group: ns-exact-compact-gamma-cutset-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  finite-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install numerical dependency
        run: python -m pip install --disable-pip-version-check numpy
      - name: Reproduce finite falsification audit
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ns-compact-gamma-audit"
          python scripts/ns_compact_gamma_exact_cutset_audit.py \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/audit.json" --pretty
          python scripts/check_ns_compact_gamma_exact_cutset_audit.py \
            --source-json "$RUNNER_TEMP/ns-compact-gamma-audit/audit.json" \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/check.json"
          diff -u scripts/data/outputs/ns_compact_gamma_exact_cutset_audit.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/audit.json"
          diff -u scripts/data/outputs/check_ns_compact_gamma_exact_cutset_audit.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/check.json"
      - name: Reproduce exact finite-core certificate and tail obligations
        run: |
          set -euo pipefail
          python scripts/ns_compact_gamma_certificate_generator.py \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/certificate.json" \
            --radius 4 --R 8 --pretty
          python scripts/check_ns_compact_gamma_certificate_bundle.py \
            --source-json "$RUNNER_TEMP/ns-compact-gamma-audit/certificate.json" \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/certificate-check.json"
          diff -u scripts/data/outputs/ns_compact_gamma_certificate_bundle.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/certificate.json"
          diff -u scripts/data/outputs/check_ns_compact_gamma_certificate_bundle.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/certificate-check.json"
      - name: Reproduce concrete carrier proof-and-falsification program
        run: |
          set -euo pipefail
          python scripts/ns_periodic_concrete_proof_program.py \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/concrete-program.json"
          python scripts/check_ns_periodic_concrete_proof_program.py \
            --source-json "$RUNNER_TEMP/ns-compact-gamma-audit/concrete-program.json" \
            --output-json "$RUNNER_TEMP/ns-compact-gamma-audit/concrete-program-check.json"
          diff -u scripts/data/outputs/ns_periodic_concrete_proof_program.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/concrete-program.json"
          diff -u scripts/data/outputs/check_ns_periodic_concrete_proof_program.json \
            "$RUNNER_TEMP/ns-compact-gamma-audit/concrete-program-check.json"

  focused-agda:
    needs: finite-audit
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check universal periodic-Fourier reductions and concrete program
        shell: bash
        run: |
          set -euo pipefail
          export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
          export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
          export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
          export AGDA_JOBS=1
          scripts/run_agda29_parallel_check.sh \
            DASHI/Physics/Closure/NSCompactGammaConcreteBernsteinEnvelopeDomainTest.agda
