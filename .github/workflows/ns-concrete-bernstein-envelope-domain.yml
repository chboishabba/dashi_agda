name: NS exact compact-Gamma mathematical cutset

on:
  pull_request:
    paths:
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaConcreteBernsteinEnvelopeDomain.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaConcreteInequalitySynthesis.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaConcreteAnalyticCutset.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaFourCriticalObligations.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaFrontierAttackLemmas.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaCriticalObligationCompletion.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaGeometricShellDecay.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaGammaNearTailCompletion.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaParameterCoverageCompletion.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOfficialDataObstruction.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOfficialCoverageCompletion.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaStandardAnalysisCompletion.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaExactMathematicalCutset.agda'
      - 'DASHI/Physics/Closure/NSClaySubmissionReadinessGate.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaConcreteBernsteinEnvelopeDomainTest.agda'
      - '.github/workflows/ns-concrete-bernstein-envelope-domain.yml'
  push:
    paths:
      - 'DASHI/Physics/Closure/NSPairIncidenceKernelProgram.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaConcreteBernsteinEnvelopeDomain.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaConcreteInequalitySynthesis.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaConcreteAnalyticCutset.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaFourCriticalObligations.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaFrontierAttackLemmas.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaCriticalObligationCompletion.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaGeometricShellDecay.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaGammaNearTailCompletion.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaParameterCoverageCompletion.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOfficialDataObstruction.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaOfficialCoverageCompletion.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaStandardAnalysisCompletion.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaExactMathematicalCutset.agda'
      - 'DASHI/Physics/Closure/NSClaySubmissionReadinessGate.agda'
      - 'DASHI/Physics/Closure/NSCompactGammaConcreteBernsteinEnvelopeDomainTest.agda'
      - '.github/workflows/ns-concrete-bernstein-envelope-domain.yml'

concurrency:
  group: ns-exact-compact-gamma-cutset-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check exact compact-Gamma mathematical cutset
        shell: bash
        run: |
          set -euo pipefail
          export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
          export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
          export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
          export AGDA_JOBS=1
          scripts/run_agda29_parallel_check.sh \
            DASHI/Physics/Closure/NSCompactGammaConcreteBernsteinEnvelopeDomainTest.agda
