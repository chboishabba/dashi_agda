name: DASHI penumbral moonshine Agda check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "DASHI/Moonshine/Penumbral*.agda"
      - "DASHI/Moonshine/SingularThetaBorcherdsBridge.agda"
      - "DASHI/Moonshine/TraceOfSingularModuliBridge.agda"
      - "DASHI/Moonshine/ThompsonFourAvatarBridge.agda"
      - "DASHI/Moonshine/ThompsonPenumbralSpecialization.agda"
      - ".github/workflows/penumbral-agda-check.yml"

jobs:
  penumbral-agda:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Typecheck penumbral moonshine surface
        run: |
          nix develop -c agda \
            -i . \
            -l standard-library \
            DASHI/Moonshine/PenumbralMoonshineSurface.agda \
            2>&1 | tee penumbral-surface-check.log

      - name: Upload Agda check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: penumbral-agda-check-log
          path: penumbral-surface-check.log
          if-no-files-found: ignore
