# Focused compiler gate for the cognition-dynamics tranche.
name: DASHI cognition dynamics check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'DASHI/Cognition/CompressionAttractor.agda'
      - 'DASHI/Control/DynamicalTernarySignal.agda'
      - 'DASHI/Cognition/ResponseKink.agda'
      - 'DASHI/Cognition/KepplerAdmissibility.agda'
      - 'DASHI/Cognition/MicrocolumnPhase.agda'
      - 'DASHI/Cognition/CuspCompressionModel.agda'
      - 'DASHI/Cognition/PatternGenerator.agda'
      - 'DASHI/Cognition/DASHICognitionDynamicsRegression.agda'
      - 'Docs/formal/DASHICognitionDynamics.md'
      - '.github/workflows/dashi-cognition-dynamics-agda.yml'

concurrency:
  group: dashi-cognition-dynamics-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: dashi-cognition-dynamics-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}

      - name: Check cognition dynamics aggregate
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-dashi-cognition-dynamics.log"
            export AGDA_JOBS=4
            scripts/run_agda29_parallel_check.sh \
              DASHI/Cognition/DASHICognitionDynamicsRegression.agda
          ) > agda-dashi-cognition-dynamics.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 320 agda-dashi-cognition-dynamics.log
          exit 0

      - name: Upload Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashi-cognition-dynamics-agda-log
          path: agda-dashi-cognition-dynamics.log
          if-no-files-found: error

      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
