name: Balaban SU2 carrier check

on:
  push:
    branches:
      - codex/balaban-su2-quaternion-carrier
      - codex/balaban-su2-quaternion-carrier-clean
  pull_request:
    paths:
      - 'DASHI/Physics/YangMills/BalabanRealRingSolverProbe.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2QuaternionCarrier.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2LieAlgebraCarrier.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2AdjointInnerProduct.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2LiteralOperatorInstances.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2LieBracket.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2AdjointPolynomialCalculus.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2AdjointCubicReduction.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2ReducedAdjointCalculus.agda'
      - 'DASHI/Physics/YangMills/BalabanSU2AdjointMatrixDeterminant.agda'
      - '.github/workflows/balaban-su2-probe-check.yml'

permissions:
  contents: read

jobs:
  su2-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check concrete SU2 carrier lane
        id: check
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            AGDA_BIN="$(nix build --no-link --print-out-paths nixpkgs#agda)/bin/agda"
            STDLIB_OUT="$(nix build --no-link --print-out-paths nixpkgs#agdaPackages.standard-library)"
            STDLIB_FILE="$(find "$STDLIB_OUT" -type f -path '*/Data/Product.agda' -print -quit)"
            STDLIB_INCLUDE="${STDLIB_FILE%/Data/Product.agda}"
            CHECK_ROOT="$(mktemp -d)"
            cp -a "$GITHUB_WORKSPACE/DASHI" "$CHECK_ROOT/DASHI"
            cp -a "$STDLIB_INCLUDE" "$CHECK_ROOT/standard-library"
            chmod -R u+w "$CHECK_ROOT/standard-library"
            targets=(
              DASHI/Physics/YangMills/BalabanRealRingSolverProbe.agda
              DASHI/Physics/YangMills/BalabanSU2QuaternionCarrier.agda
              DASHI/Physics/YangMills/BalabanSU2LieAlgebraCarrier.agda
              DASHI/Physics/YangMills/BalabanSU2AdjointInnerProduct.agda
              DASHI/Physics/YangMills/BalabanSU2LiteralOperatorInstances.agda
              DASHI/Physics/YangMills/BalabanSU2LieBracket.agda
              DASHI/Physics/YangMills/BalabanSU2AdjointPolynomialCalculus.agda
              DASHI/Physics/YangMills/BalabanSU2AdjointCubicReduction.agda
              DASHI/Physics/YangMills/BalabanSU2ReducedAdjointCalculus.agda
              DASHI/Physics/YangMills/BalabanSU2AdjointMatrixDeterminant.agda
            )
            for target in "${targets[@]}"; do
              echo "Checking: $target"
              "$AGDA_BIN" --no-libraries --no-default-libraries \
                -i "$CHECK_ROOT" -i "$CHECK_ROOT/standard-library" \
                "$CHECK_ROOT/$target"
            done
          ) > su2-carrier-check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 120 su2-carrier-check.log
          exit 0
      - name: Upload SU2 check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: balaban-su2-carrier-log
          path: su2-carrier-check.log
          if-no-files-found: error
      - name: Fail on Agda error
        if: steps.check.outputs.status != '0'
        run: exit 1
