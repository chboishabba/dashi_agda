name: One-shot SU2 adjoint bridge patch

on:
  push:
    paths:
      - .github/workflows/one-shot-su2-adjoint-bridge.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply nested adjoint bridge
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("DASHI/Physics/YangMills/BalabanSU2LieAlgebraCarrier.agda")
          text = path.read_text()

          old = '''su2AdjointMultiply :
  ∀ u v X →
  su2Adjoint (su2Multiply u v) X
    ≡ su2Adjoint u (su2Adjoint v X)
su2AdjointMultiply
  (su2q (quat a₀ a₁ a₂ a₃) a-unit)
  (su2q (quat b₀ b₁ b₂ b₃) b-unit)
  (su2Lie x y z) =
  let proof = adjointQuaternionMultiply
        (quat a₀ a₁ a₂ a₃)
        (quat b₀ b₁ b₂ b₃)
        (quat zeroR x y z)
  in su2LieExt
    (cong q1 proof)
    (cong q2 proof)
    (cong q3 proof)
'''

          new = '''adjointQuaternionNested :
  ∀ u v X →
  adjointQuaternion u (su2Adjoint v X)
    ≡
  (quaternion u *q adjointQuaternion v X)
    *q conjugateQ (quaternion u)
adjointQuaternionNested u v X =
  cong
    (λ q → (quaternion u *q q) *q conjugateQ (quaternion u))
    (lieQuaternionAdjoint v X)

adjointQuaternionMultiplyNested :
  ∀ u v X →
  adjointQuaternion (su2Multiply u v) X
    ≡ adjointQuaternion u (su2Adjoint v X)
adjointQuaternionMultiplyNested u v X =
  trans
    (adjointQuaternionMultiply
      (quaternion u)
      (quaternion v)
      (lieQuaternion X))
    (trans
      (cong
        (λ q → q *q conjugateQ (quaternion u))
        (quaternionMultiplyAssociative
          (quaternion u)
          (quaternion v *q lieQuaternion X)
          (conjugateQ (quaternion v))))
      (sym (adjointQuaternionNested u v X)))

su2AdjointMultiply :
  ∀ u v X →
  su2Adjoint (su2Multiply u v) X
    ≡ su2Adjoint u (su2Adjoint v X)
su2AdjointMultiply u v X =
  let proof = adjointQuaternionMultiplyNested u v X
  in su2LieExt
    (cong q1 proof)
    (cong q2 proof)
    (cong q3 proof)
'''

          if old not in text:
              raise SystemExit("expected su2AdjointMultiply block not found")
          path.write_text(text.replace(old, new, 1))
          PY

          rm .github/workflows/one-shot-su2-adjoint-bridge.yml

      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DASHI/Physics/YangMills/BalabanSU2LieAlgebraCarrier.agda .github/workflows/one-shot-su2-adjoint-bridge.yml
          git commit -m "Prove nested SU2 adjoint multiplication bridge"
          git push origin HEAD:master
