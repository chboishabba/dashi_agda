name: Rubik kernel Cayley Agda check

on:
  push:
    paths:
      - 'DASHI/Automata/KernelInternal.agda'
      - 'DASHI/Puzzles/RubiksPhasicState.agda'
      - 'DASHI/Puzzles/RubiksCayleyControlMetric.agda'
      - 'DASHI/Puzzles/RubiksCayleyAll.agda'
      - 'Docs/RubiksKernelCayleyPhasic.md'
      - '.github/workflows/rubiks-kernel-cayley.yml'
  pull_request:
    paths:
      - 'DASHI/Automata/KernelInternal.agda'
      - 'DASHI/Puzzles/RubiksPhasicState.agda'
      - 'DASHI/Puzzles/RubiksCayleyControlMetric.agda'
      - 'DASHI/Puzzles/RubiksCayleyAll.agda'
      - 'Docs/RubiksKernelCayleyPhasic.md'
      - '.github/workflows/rubiks-kernel-cayley.yml'

concurrency:
  group: rubiks-kernel-cayley-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: rubiks-kernel-cayley-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}

      - name: Check Rubik kernel/Cayley modules with Agda 2.9
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-rubiks-kernel-cayley-check.log"
            export AGDA_JOBS=3
            targets=(
              DASHI/Automata/KernelInternal.agda
              DASHI/Puzzles/RubiksPhasicState.agda
              DASHI/Puzzles/RubiksCayleyControlMetric.agda
              DASHI/Puzzles/RubiksCayleyAll.agda
            )
            scripts/run_agda29_parallel_check.sh "${targets[@]}"
          ) > agda-rubiks-kernel-cayley-check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 220 agda-rubiks-kernel-cayley-check.log
          exit 0

      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rubiks-kernel-cayley-agda-log
          path: agda-rubiks-kernel-cayley-check.log
          if-no-files-found: error

      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
