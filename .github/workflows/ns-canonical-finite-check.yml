name: NS canonical finite Agda check

on:
  push:
    branches:
      - codex/ns-canonical-finite-closure
  pull_request:
    paths:
      - 'DASHI/Physics/Closure/NSTriadKNCanonical*.agda'
      - 'DASHI/Physics/Closure/NSTriadKNExactComplex*.agda'
      - 'DASHI/Physics/Closure/NSTriadKNCanonicalEnvelope*.agda'
      - '.github/workflows/ns-canonical-finite-check.yml'

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check focused Navier-Stokes modules
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            AGDA_BIN="$(nix build --no-link --print-out-paths nixpkgs#agda)/bin/agda"
            STDLIB_OUT="$(nix build --no-link --print-out-paths nixpkgs#agdaPackages.standard-library)"
            STDLIB_FILE="$(find "$STDLIB_OUT" -type f -path '*/Data/Product.agda' -print -quit)"
            if [ -z "$STDLIB_FILE" ]; then
              echo "Unable to locate Data/Product.agda under $STDLIB_OUT" >&2
              exit 2
            fi
            STDLIB_INCLUDE="${STDLIB_FILE%/Data/Product.agda}"
            CHECK_ROOT="$(mktemp -d)"
            cp -a "$GITHUB_WORKSPACE/DASHI" "$CHECK_ROOT/DASHI"
            cp -a "$STDLIB_INCLUDE" "$CHECK_ROOT/standard-library"
            chmod -R u+w "$CHECK_ROOT/standard-library"
            "$AGDA_BIN" --version
            targets=(
              DASHI/Physics/Closure/NSTriadKNCanonicalTriadOrbitEnumerationConcrete.agda
              DASHI/Physics/Closure/NSTriadKNCanonicalOrbitFoldEquality.agda
            )
            cd "$CHECK_ROOT"
            for target in "${targets[@]}"; do
              echo "Checking: $target"
              "$AGDA_BIN" \
                --no-libraries --no-default-libraries \
                -i "$CHECK_ROOT" -i "$CHECK_ROOT/standard-library" \
                "$CHECK_ROOT/$target"
            done
          ) > agda-focused-check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 160 agda-focused-check.log
          exit 0

      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-canonical-focused-agda-log
          path: agda-focused-check.log
          if-no-files-found: error

      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
