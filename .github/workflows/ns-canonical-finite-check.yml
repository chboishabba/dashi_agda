name: NS canonical finite Agda check

on:
  push:
    branches:
      - codex/ns-canonical-finite-closure
  pull_request:
    paths:
      - 'DASHI/Physics/Closure/NSTriadKNCanonical*.agda'
      - 'DASHI/Physics/Closure/NSTriadKNExactComplex*.agda'
      - '.github/workflows/ns-canonical-finite-check.yml'

concurrency:
  group: ns-canonical-focused-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: .cache/dashi-agda29
          key: ns-agda29-${{ runner.os }}-86a1179-experimental-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}

      - name: Check focused Navier-Stokes modules with Agda 2.9
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$GITHUB_WORKSPACE/.cache/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-focused-check.log"
            export AGDA_JOBS=4
            targets=(
              DASHI/Physics/Closure/NSTriadKNCanonicalTriadOrbitQuotient.agda
              DASHI/Physics/Closure/NSTriadKNCanonicalOrbitFoldEquality.agda
              DASHI/Physics/Closure/NSTriadKNExactComplexModalTransfer.agda
              DASHI/Physics/Closure/NSTriadKNCanonicalEnvelopeProductIdentity.agda
            )
            scripts/run_agda29_parallel_check.sh "${targets[@]}"
          ) > agda-focused-check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 180 agda-focused-check.log
          exit 0

      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ns-canonical-focused-agda-log
          path: agda-focused-check.log
          if-no-files-found: error

      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
