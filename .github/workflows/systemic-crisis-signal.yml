name: Systemic crisis signal Agda check

on:
  push:
    paths:
      - 'DASHI/Economics/SystemicCrisisSignalKernel.agda'
      - 'DASHI/Economics/SystemicCrisisSignalKernelTests.agda'
      - 'DASHI/Economics/SystemicCrisisCompressionBridge.agda'
      - 'DASHI/Economics/SystemicCrisisCompressionBridgeTests.agda'
      - 'DASHI/Economics/SystemicCrisisScenarioCrosswalk.agda'
      - 'DASHI/Economics/SystemicCrisisScenarioCrosswalkTests.agda'
      - 'DASHI/Economics/SystemicCrisisSignalAll.agda'
      - 'DASHI/Promotion/TechSystemicStressScenarioBoundary.agda'
      - 'Docs/SystemicCrisisSignalKernel.md'
      - '.github/workflows/systemic-crisis-signal.yml'
  pull_request:
    paths:
      - 'DASHI/Economics/SystemicCrisisSignalKernel.agda'
      - 'DASHI/Economics/SystemicCrisisSignalKernelTests.agda'
      - 'DASHI/Economics/SystemicCrisisCompressionBridge.agda'
      - 'DASHI/Economics/SystemicCrisisCompressionBridgeTests.agda'
      - 'DASHI/Economics/SystemicCrisisScenarioCrosswalk.agda'
      - 'DASHI/Economics/SystemicCrisisScenarioCrosswalkTests.agda'
      - 'DASHI/Economics/SystemicCrisisSignalAll.agda'
      - 'DASHI/Promotion/TechSystemicStressScenarioBoundary.agda'
      - 'Docs/SystemicCrisisSignalKernel.md'
      - '.github/workflows/systemic-crisis-signal.yml'

concurrency:
  group: systemic-crisis-signal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: systemic-crisis-signal-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}

      - name: Check systemic crisis signal modules with Agda 2.9
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-systemic-crisis-signal-check.log"
            export AGDA_JOBS=4
            targets=(
              DASHI/Economics/SystemicCrisisSignalKernel.agda
              DASHI/Economics/SystemicCrisisSignalKernelTests.agda
              DASHI/Economics/SystemicCrisisCompressionBridge.agda
              DASHI/Economics/SystemicCrisisCompressionBridgeTests.agda
              DASHI/Economics/SystemicCrisisScenarioCrosswalk.agda
              DASHI/Economics/SystemicCrisisScenarioCrosswalkTests.agda
              DASHI/Economics/SystemicCrisisSignalAll.agda
            )
            scripts/run_agda29_parallel_check.sh "${targets[@]}"
          ) > agda-systemic-crisis-signal-check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 220 agda-systemic-crisis-signal-check.log
          exit 0

      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: systemic-crisis-signal-agda-log
          path: agda-systemic-crisis-signal-check.log
          if-no-files-found: error

      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
