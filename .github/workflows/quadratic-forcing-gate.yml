name: Quadratic forcing gate Agda check

on:
  push:
    paths:
      - 'DASHI/Geometry/UniversalCanonicalQuotient.agda'
      - 'DASHI/Geometry/HilbertLorentzForcing.agda'
      - 'DASHI/Geometry/QuadraticForcingGate.agda'
      - '.github/workflows/quadratic-forcing-gate.yml'
  pull_request:
    paths:
      - 'DASHI/Geometry/UniversalCanonicalQuotient.agda'
      - 'DASHI/Geometry/HilbertLorentzForcing.agda'
      - 'DASHI/Geometry/QuadraticForcingGate.agda'
      - '.github/workflows/quadratic-forcing-gate.yml'

concurrency:
  group: quadratic-forcing-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check quadratic forcing modules with Agda 2.9
        id: focused
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-quadratic-forcing-check.log"
            export AGDA_JOBS=3
            targets=(
              DASHI/Geometry/UniversalCanonicalQuotient.agda
              DASHI/Geometry/HilbertLorentzForcing.agda
              DASHI/Geometry/QuadraticForcingGate.agda
            )
            scripts/run_agda29_parallel_check.sh "${targets[@]}"
          ) > agda-quadratic-forcing-check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 220 agda-quadratic-forcing-check.log
          exit 0

      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quadratic-forcing-agda-log
          path: agda-quadratic-forcing-check.log
          if-no-files-found: error

      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
