name: DASHI quantum computation bridge

on:
  push:
    paths:
      - 'DASHI/Algebra/Quantum/DASHIQuantumBridge.agda'
      - 'DASHI/Algebra/Quantum/DASHIHybridExecution.agda'
      - 'DASHI/Algebra/Quantum/DASHIStructuredStateCompression.agda'
      - 'DASHI/Algebra/Quantum/DASHIQuantumNormalForm.agda'
      - 'DASHI/Algebra/Quantum/DASHIQuantumComputationProgram.agda'
      - 'docs/dashi_quantum_computation_program.md'
      - 'scripts/run_agda29_parallel_check.sh'
      - '.github/workflows/dashi-quantum-computation.yml'
  pull_request:
    paths:
      - 'DASHI/Algebra/Quantum/DASHIQuantumBridge.agda'
      - 'DASHI/Algebra/Quantum/DASHIHybridExecution.agda'
      - 'DASHI/Algebra/Quantum/DASHIStructuredStateCompression.agda'
      - 'DASHI/Algebra/Quantum/DASHIQuantumNormalForm.agda'
      - 'DASHI/Algebra/Quantum/DASHIQuantumComputationProgram.agda'
      - 'docs/dashi_quantum_computation_program.md'
      - 'scripts/run_agda29_parallel_check.sh'
      - '.github/workflows/dashi-quantum-computation.yml'

concurrency:
  group: dashi-quantum-computation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-agda:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore Agda 2.9 shadow cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dashi-agda29
          key: dashi-quantum-agda29-${{ runner.os }}-86a1179-${{ hashFiles('scripts/run_agda29_parallel_check.sh') }}
      - name: Check DASHI quantum computation modules
        id: focused
        shell: bash
        run: |
          set +e
          (
            export AGDA_FLAKE="github:agda/agda/86a1179c1f886da773dc53be920bcca5d876884e#debug.bin"
            export DASHI_REPO_ROOT="$GITHUB_WORKSPACE"
            export DASHI_AGDA29_CACHE_ROOT="$RUNNER_TEMP/dashi-agda29"
            export AGDA_LOG_PATH="$GITHUB_WORKSPACE/agda-dashi-quantum-check.log"
            export AGDA_JOBS=2
            targets=(
              DASHI/Algebra/Quantum/DASHIQuantumBridge.agda
              DASHI/Algebra/Quantum/DASHIHybridExecution.agda
              DASHI/Algebra/Quantum/DASHIStructuredStateCompression.agda
              DASHI/Algebra/Quantum/DASHIQuantumNormalForm.agda
              DASHI/Algebra/Quantum/DASHIQuantumComputationProgram.agda
            )
            scripts/run_agda29_parallel_check.sh "${targets[@]}"
          ) > agda-dashi-quantum-check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 220 agda-dashi-quantum-check.log
          exit 0
      - name: Upload focused Agda log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashi-quantum-computation-agda-log
          path: agda-dashi-quantum-check.log
          if-no-files-found: error
      - name: Fail on Agda error
        if: steps.focused.outputs.status != '0'
        run: exit 1
