name: Materialize triadic arithmetic laws

on:
  push:
    branches:
      - agent/triadic-spectral-completion
    paths:
      - scripts/generate_triadic_arithmetic_laws.py
      - .github/workflows/materialize-triadic-arithmetic-laws.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/triadic-spectral-completion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate complete Agda proof table
        run: python scripts/generate_triadic_arithmetic_laws.py
      - name: Commit generated source when changed
        run: |
          if git diff --quiet -- DASHI/Algebra/TriadicFiniteArithmeticLaws.agda; then
            echo "Generated source already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DASHI/Algebra/TriadicFiniteArithmeticLaws.agda
          git commit -m "Generate complete arbitrary-depth triadic arithmetic proof"
          git push origin HEAD:agent/triadic-spectral-completion
