name: Braided emotion governance

on:
  pull_request:
    paths:
      - "DASHI/Biology/BraidedEmotion*.agda"
      - "DASHI/Biology/*Governance*.agda"
      - "DASHI/Culture/KimmererBraidingAcknowledgement.agda"
      - "DASHI/Culture/CulturalProvenanceBoundaryCore.agda"
      - "DASHI/Promotion/*BoundaryCore.agda"
      - "DASHI/Unified/BraidedEmotionGovernanceRegression.agda"
      - "scripts/audit_governance_builtins_only.py"
      - "scripts/governance_builtins_allowlist.txt"
      - ".github/workflows/braided-emotion-governance.yml"
  push:
    branches: [master]
    paths:
      - "DASHI/Biology/BraidedEmotion*.agda"
      - "DASHI/Biology/*Governance*.agda"
      - "DASHI/Culture/KimmererBraidingAcknowledgement.agda"
      - "DASHI/Culture/CulturalProvenanceBoundaryCore.agda"
      - "DASHI/Promotion/*BoundaryCore.agda"
      - "DASHI/Unified/BraidedEmotionGovernanceRegression.agda"
      - "scripts/audit_governance_builtins_only.py"
      - "scripts/governance_builtins_allowlist.txt"
      - ".github/workflows/braided-emotion-governance.yml"

permissions:
  contents: read

jobs:
  typecheck-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          show-progress: false

      - name: Install Agda
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq agda-bin >/dev/null
          agda --version

      - name: Typecheck unified governance facade
        run: |
          mkdir -p ci-logs
          agda --no-libraries --no-default-libraries -i . \
            DASHI/Unified/BraidedEmotionGovernanceRegression.agda \
            >ci-logs/unified-governance.log 2>&1 || {
              tail -n 120 ci-logs/unified-governance.log
              exit 1
            }

      - name: Upload unified typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: braided-emotion-agda-log
          path: ci-logs/unified-governance.log
          if-no-files-found: warn

      - name: Typecheck braided emotion regression
        run: agda --no-libraries --no-default-libraries -i . DASHI/Biology/BraidedEmotionCanonicalIntegrationRegression.agda

      - name: Typecheck body-memory governance regression
        run: agda --no-libraries --no-default-libraries -i . DASHI/Biology/BodyMemoryGovernanceCanonicalRegression.agda

      - name: Typecheck Kimmerer acknowledgement
        run: agda --no-libraries --no-default-libraries -i . DASHI/Culture/KimmererBraidingAcknowledgement.agda

      - name: Reject new unapproved governance islands
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            git fetch --quiet --depth=1 origin "$BASE_SHA"
          fi
          python3 scripts/audit_governance_builtins_only.py . \
            --changed-from "$BASE_SHA" \
            --fail

      - name: Report all legacy governance islands
        run: python3 scripts/audit_governance_builtins_only.py .
