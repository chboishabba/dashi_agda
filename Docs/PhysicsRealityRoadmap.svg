 carrier vocabulary.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="355.0823" x="902.52" y="533.347">It is a typed bridge and diagrammatic interpretation layer,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.7732" x="979.1746" y="551.053">not a solved unification theorem.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="270.7122" x="944.705" y="568.759">Concrete contraction still needs a certificate.</text></g><g class="entity" data-qualified-name="GMN188" data-source-line="254" id="ent0189"><path d="M6771.61,1856.7379 L6771.61,1901.856 A9,9 0 0 0 6780.61,1910.856 L7255.2504,1910.856 A9,9 0 0 0 7264.2504,1901.856 L7264.2504,1857.7379 L7254.2504,1847.7379 L6780.61,1847.7379 A9,9 0 0 0 6771.61,1856.7379" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M7254.2504,1847.7379 L7254.2504,1853.2379 A4.5,4.5 0 0 0 7258.7504,1857.7379 L7264.2504,1857.7379 L7254.2504,1847.7379" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.0493" x="6865.4056" y="1866.6349">This is where the public story needed correction:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="257.5562" x="6884.6521" y="1884.3409">not solved, no longer "missing from zero",</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="471.6404" x="6777.61" y="1902.047">and now blocked on named seam hypotheses rather than vague future work.</text></g><g class="entity" data-qualified-name="GMN191" data-source-line="260" id="ent0192"><path d="M1811.2,568.3279 L1811.2,684.27 A9,9 0 0 0 1820.2,693.27 L2142.6493,693.27 A9,9 0 0 0 2151.6493,684.27 L2151.6493,569.3279 L2141.6493,559.3279 L1820.2,559.3279 A9,9 0 0 0 1811.2,568.3279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2141.6493,559.3279 L2141.6493,564.8279 A4.5,4.5 0 0 0 2146.1493,569.3279 L2151.6493,569.3279 L2141.6493,559.3279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="299.8713" x="1826.989" y="578.2249">Closest current contact with experimental reality:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.0262" x="1820.9115" y="595.9309">photonuclear / collider measurement organization.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.4493" x="1817.2" y="613.637">This is useful, but it is not the same as deriving QCD,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.6673" x="1825.091" y="631.343">and it is not the only atom/nuclear-facing surface.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.8752" x="1850.987" y="649.049">Current empirical adequacy is not closed:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.2752" x="1839.287" y="666.755">chi2 and orbit-shell surfaces do not yet prove</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="233.2072" x="1860.321" y="684.461">fixed-point prediction of observations.</text></g><g class="entity" data-qualified-name="GMN194" data-source-line="270" id="ent0195"><path d="M1794.39,399.3279 L1794.39,515.27 A9,9 0 0 0 1803.39,524.27 L2159.4573,524.27 A9,9 0 0 0 2168.4573,515.27 L2168.4573,400.3279 L2158.4573,390.3279 L1803.39,390.3279 A9,9 0 0 0 1794.39,399.3279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2158.4573,390.3279 L2158.4573,395.8279 A4.5,4.5 0 0 0 2162.9573,400.3279 L2168.4573,400.3279 L2158.4573,390.3279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.5281" x="1920.6596" y="409.2249">Safe music bridge:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="135.7201" x="1909.0636" y="426.9309">Z12 ~= Z3 x Z4 by CRT.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.0541" x="1904.3966" y="444.637">MusicalAttractor target:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.5253" x="1844.161" y="462.343">K_music projects to a chosen diatonic scale,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="353.0673" x="1800.39" y="480.049">L_music is chromatic dissonance, and descent is one-step.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.8773" x="1823.985" y="497.755">Do not claim the perfect fifth shift gives a Z3 orbit;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.4991" x="1902.6741" y="515.461">+7 mod 12 has order 12.</text></g><g class="entity" data-qualified-name="GMN197" data-source-line="280" id="ent0198"><path d="M870.52,354.0379 L870.52,434.568 A9,9 0 0 0 879.52,443.568 L1289.6023,443.568 A9,9 0 0 0 1298.6023,434.568 L1298.6023,355.0379 L1288.6023,345.0379 L879.52,345.0379 A9,9 0 0 0 870.52,354.0379" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1288.6023,345.0379 L1288.6023,350.5379 A4.5,4.5 0 0 0 1293.1023,355.0379 L1298.6023,355.0379 L1288.6023,345.0379" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="334.1002" x="913.011" y="363.9349">These adjacent lanes matter for roadmap truthfulness.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="341.1462" x="909.488" y="381.6409">They widen the program beyond the core physics spine,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="380.0293" x="890.0465" y="399.347">but they do not upgrade the current repo to solved unification</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="328.7442" x="915.689" y="417.053">or to local theorem closure on brain/crossover claims.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="407.0823" x="876.52" y="434.759">The blocker boxes are intentionally separate from the lane objects.</text></g><g class="entity" data-qualified-name="GMN200" data-source-line="288" id="ent0201"><path d="M3018.2,1600.6779 L3018.2,1999.9163 A9,9 0 0 0 3027.2,2008.9163 L3543.5443,2008.9163 A9,9 0 0 0 3552.5443,1999.9163 L3552.5443,1601.6779 L3542.5443,1591.6779 L3027.2,1591.6779 A9,9 0 0 0 3018.2,1600.6779" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M3542.5443,1591.6779 L3542.5443,1597.1779 A4.5,4.5 0 0 0 3547.0443,1601.6779 L3552.5443,1601.6779 L3542.5443,1591.6779" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="246.3112" x="3157.7165" y="1610.5749">This path is now explicit in the roadmap:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="440.5313" x="3060.6065" y="1628.2809">brain -&gt; brain-DNA -&gt; DNA/chemistry -&gt; physics-facing chemistry carrier.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="314.8863" x="3123.429" y="1645.987">It is also now consumed by bounded local modules,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="274.2612" x="3143.7415" y="1663.693">including bounded representation semantics</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.4262" x="3158.659" y="1681.399">bounded representation transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.9792" x="3154.8825" y="1699.105">bounded representation semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.0222" x="3159.361" y="1716.811">bounded representation semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.3412" x="3123.2016" y="1734.517">bounded representation-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.2473" x="3137.7485" y="1752.2231">bounded representation-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.0992" x="3198.8226" y="1769.9291">connector semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.0692" x="3161.8375" y="1787.6351">theme-to-chemistry/channel transport,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="193.9342" x="3183.9051" y="1805.3411">theme semantic-transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.0052" x="3174.3695" y="1823.0471">theme end-to-end semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.3352" x="3178.2046" y="1840.7531">theme-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.2412" x="3192.7516" y="1858.4592">theme-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.1742" x="3167.785" y="1876.1652">connector end-to-end semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.4612" x="3167.1416" y="1893.8712">connector-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.0032" x="3149.3705" y="1911.5772">connector-integrated consumer semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.9822" x="3179.3811" y="1929.2832">BrainWholeChainIntegrationLaw,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.0922" x="3169.826" y="1946.9892">and BrainPhysicsHandoffPromotion.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="434.6943" x="3063.525" y="1964.6953">The remaining blocker is no longer absence of whole-chain integration.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="513.3443" x="3024.2" y="1982.4013">The current gap is aggregate/import governance and any future stronger consumer</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="406.1203" x="3077.812" y="2000.1073">that would exceed the bounded I_chain / H_phys handoff surfaces.</text></g><g class="entity" data-qualified-name="GMN203" data-source-line="314" id="ent0204"><path d="M6902.23,1954.7379 L6902.23,1999.856 A9,9 0 0 0 6911.23,2008.856 L7124.6222,2008.856 A9,9 0 0 0 7133.6222,1999.856 L7133.6222,1955.7379 L7123.6222,1945.7379 L6911.23,1945.7379 A9,9 0 0 0 6902.23,1954.7379" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M7123.6222,1945.7379 L7123.6222,1951.2379 A4.5,4.5 0 0 0 7128.1222,1955.7379 L7133.6222,1955.7379 L7123.6222,1945.7379" fi