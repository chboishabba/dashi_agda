IIT Phi, market self-observation,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="175.4753" x="5369.0396" y="1759.8268">and reality-self-description</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="278.6129" x="5317.4708" y="1778.8947">readings are scale-unification fixtures only</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="225.0071" x="5344.2737" y="1797.9626">Need: typed carriers at each scale,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="243.4451" x="5335.0548" y="1817.0305">scale maps, observable preservation,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="288.5389" x="5312.5078" y="1836.0984">temporal/spacetime sections/gluing/metric,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="221.2271" x="5346.1637" y="1855.1664">Time/Space containment carriers,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="203.4612" x="5355.0467" y="1874.2343">evolution-validity preservation,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="298.1149" x="5307.7199" y="1893.3022">measurement protocols, empirical validation,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="259.419" x="5327.0678" y="1912.3701">biomedical validation where applicable,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="263.269" x="5325.1428" y="1931.438">market/risk validation where applicable,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="202.5792" x="5355.4877" y="1950.5059">and clinical non-authority flags</text></g><!--entity Solved--><g class="entity" data-qualified-name="5. Target state. serious unification claim.Solved" data-source-line="97" id="ent0057"><rect fill="#BBF7D0" height="96.2717" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="269.367" x="6883.25" y="439.6579"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="249.367" x="6893.25" y="464.6239">One core theory whose limits recover:</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="207.7872" x="6914.0399" y="483.6918">quantum matter, atoms, nuclei,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="212.1552" x="6911.8559" y="502.7597">particle interactions, and gravity</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="191.4913" x="6922.1879" y="521.8276">on the right physical regimes</text></g><g class="entity" data-qualified-name="GMN149" data-source-line="198" id="ent0150"><path d="M1842.69,4911.3879 L1842.69,4974.212 A9,9 0 0 0 1851.69,4983.212 L2111.1672,4983.212 A9,9 0 0 0 2120.1672,4974.212 L2120.1672,4912.3879 L2110.1672,4902.3879 L1851.69,4902.3879 A9,9 0 0 0 1842.69,4911.3879" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2110.1672,4902.3879 L2110.1672,4907.8879 A4.5,4.5 0 0 0 2114.6672,4912.3879 L2120.1672,4912.3879 L2110.1672,4902.3879" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.8832" x="1892.487" y="4921.2849">Strongest current evidence:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218.3352" x="1867.761" y="4938.9909">formal geometric/closure structure.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.4772" x="1848.69" y="4956.697">Closest to spacetime-formalism language,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.1192" x="1865.369" y="4974.403">not yet to full atom-by-atom physics.</text></g><g class="entity" data-qualified-name="GMN152" data-source-line="205" id="ent0153"><path d="M922.34,603.3879 L922.34,666.212 A9,9 0 0 0 931.34,675.212 L1237.7993,675.212 A9,9 0 0 0 1246.7993,666.212 L1246.7993,604.3879 L1236.7993,594.3879 L931.34,594.3879 A9,9 0 0 0 922.34,603.3879" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1236.7993,594.3879 L1236.7993,599.8879 A4.5,4.5 0 0 0 1241.2993,604.3879 L1246.7993,604.3879 L1236.7993,594.3879" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="109.7201" x="1025.2096" y="613.2849">Programmer rule:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.4593" x="928.34" y="630.9909">red items are not TODO comments to hand-wave.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.0073" x="940.066" y="648.697">They need named modules, fields, and checks</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="232.1672" x="963.986" y="666.403">before diagrams should recolor them.</text></g><g class="entity" data-qualified-name="GMN155" data-source-line="212" id="ent0156"><path d="M896.52,719.5279 L896.52,800.058 A9,9 0 0 0 905.52,809.058 L1263.6023,809.058 A9,9 0 0 0 1272.6023,800.058 L1272.6023,720.5279 L1262.6023,710.5279 L905.52,710.5279 A9,9 0 0 0 896.52,719.5279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1262.6023,710.5279 L1262.6023,716.0279 A4.5,4.5 0 0 0 1267.1023,720.5279 L1272.6023,720.5279 L1262.6023,710.5279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.2532" x="966.4346" y="729.4249">CoreSpine explains why several lanes</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.4282" x="950.3471" y="747.1309">share the same ternary carrier vocabulary.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="355.0823" x="902.52" y="764.837">It is a typed bridge and diagrammatic interpretation layer,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.7732" x="979.1746" y="782.543">not a solved unification theorem.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="270.7122" x="944.705" y="800.249">Concrete contraction still needs a certificate.</text></g><g class="entity" data-qualified-name="GMN158" data-source-line="220" id="ent0159"><path d="M6771.61,580.2379 L6771.61,625.356 A9,9 0 0 0 6780.61,634.356 L7255.2504,634.356 A9,9 0 0 0 7264.2504,625.356 L7264.2504,581.2379 L7254.2504,571.2379 L6780.61,571.2379 A9,9 0 0 0 6771.61,580.2379" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M7254.2504,571.2379 L7254.2504,576.7379 A4.5,4.5 0 0 0 7258.7504,581.2379 L7264.2504,581.2379 L7254.2504,571.2379" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.0493" x="6865.4056" y="590.1349">This is where the public story needed correction:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="257.5562" x="6884.6521" y="607.8409">not solved, no longer "missing from zero",</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="471.6404" x="6777.61" y="625.547">and now blocked on named seam hypotheses rather than vague future work.</text></g><g class="entity" data-qualified-name="GMN161" data-source-line="226" id="ent0162"><path d="M1811.2,980.8279 L1811.2,1096.77 A9,9 0 0 0 1820.2,1105.77 L2142.6493,1105.77 A9,9 0 0 0 2151.6493,1096.77 L2151.6493,981.8279 L2141.6493,971.8279 L1820.2,971.8279 A9,9 0 0 0 1811.2,980.8279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2141.6493,971.8279 L2141.6493,977.3279 A4.5,4.5 0 0 0 2146.1493,981.8279 L2151.6493,981.8279 L2141.6493,971.8279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="299.8713" x="1826.989" y="990.7249">Closest current contact with experimental reality:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.0262" x="1820.9115" y="1008.4309">photonuclear / collider measurement organization.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.4493" x="1817.2" y="1026.137">This is useful, but it is not the same as deriving QCD,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.6673" x="1825.091" y="1043.843">and it is not the only atom/nuclear-facing surface.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.8752" x="1850.987" y="1061.549">Current empirical adequacy is not closed:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.2752" x="1839.287" y="1079.255">chi2 and orbit-shell surfaces do not yet prove</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="233.2072" x="1860.321" y="1096.961">fixed-point prediction of observations.</text></g><g class="entity" data-qualified-name="GMN164" data-source-line="236" id="ent0165"><path d="M1794.39,1238.8279 L1794.39,1354.77 A9,9 0 0 0 1803.39,1363.77 L2159.4573,1363.77 A9,9 0 0 0 2168.4573,1354.77 L2168.4573,1239.8279 L2158.4573,1229.8279 L1803.39,1229.8279 A9,9 0 0 0 1794.39,1238.8279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2158.4573,1229.8279 L2158.4573,1235.3279 A4.5,4.5 0 0 0 2162.9573,1239.8279 L2168.4573,1239.8279 L2158.4573,1229.8279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.5281" x="1920.6596" y="1248.7249">Safe music bridge:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="135.7201" x="1909.0636" y="1266.4309">Z12 ~= Z3 x Z4 by CRT.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.0541" x="1904.3966" y="1284.137">MusicalAttractor target:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.5253" x="1844.161" y="1301.843">K_music projects to a chosen diatonic scale,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="353.0673" x="1800.39" y="1319.549">L_music is chromatic dissonance, and descent is one-step.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.8773" x="1823.985" y="1337.255">Do not claim the perfect fifth shift gives a Z3 orbit;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.4991" x="1902.6741" y="1354.961">+7 mod 12 has order 12.</text></g><g class="entity" data-qualified-name="GMN167" data-source-line="246" id="ent0168"><path d="M870.52,3571.5279 L870.52,3652.058 A9,9 0 0 0 879.52,3661.058 L1289.6023,3661.058 A9,9 0 0 0 1298.6023,3652.058 L1298.6023,3572.5279 L1288.6023,3562.5279 L879.52,3562.5279 A9,9 0 0 0 870.52,3571.5279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1288.6023,3562.5279 L1288.6023,3568.0279 A4.5,4.5 0 0 0 1293.1023,3572.5279 L1298.6023,3572.5279 L1288.6023,3562.5279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="334.1002" x="913.011" y="3581.4249">These adjacent lanes matter for roadmap truthfulness.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="341.1462" x="909.488" y="3599.1309">They widen the program beyond the core physics spine,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="380.0293" x="890.0465" y="3616.837">but they do not upgrade the current repo to solved unification</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="328.7442" x="915.689" y="3634.543">or to local theorem closure on brain/crossover claims.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="407.0823" x="876.52" y="3652.249">The blocker boxes are intentionally separate from the lane objects.</text></g><g class="entity" data-qualified-name="GMN170" data-source-line="254" id="ent0171"><path d="M3018.2,3252.1779 L3018.2,3651.4163 A9,9 0 0 0 3027.2,3660.4163 L3543.5443,3660.4163 A9,9 0 0 0 3552.5443,3651.4163 L3552.5443,3253.1779 L3542.5443,3243.1779 L3027.2,3243.1779 A9,9 0 0 0 3018.2,3252.1779" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M3542.5443,3243.1779 L3542.5443,3248.6779 A4.5,4.5 0 0 0 3547.0443,3253.1779 L3552.5443,3253.1779 L3542.5443,3243.1779" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="246.3112" x="3157.7165" y="3262.0749">This path is now explicit in the roadmap:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="440.5313" x="3060.6065" y="3279.7809">brain -&gt; brain-DNA -&gt; DNA/chemistry -&gt; physics-facing chemistry carrier.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="314.8863" x="3123.429" y="3297.487">It is also now consumed by bounded local modules,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="274.2612" x="3143.7415" y="3315.193">including bounded representation semantics</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.4262" x="3158.659" y="3332.899">bounded representation transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.9792" x="3154.8825" y="3350.605">bounded representation semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.0222" x="3159.361" y="3368.311">bounded representation semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.3412" x="3123.2016" y="3386.017">bounded representation-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.2473" x="3137.7485" y="3403.7231">bounded representation-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.0992" x="3198.8226" y="3421.4291">connector semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.0692" x="3161.8375" y="3439.1351">theme-to-chemistry/channel transport,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="193.9342" x="3183.9051" y="3456.8411">theme semantic-transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.0052" x="3174.3695" y="3474.5471">theme end-to-end semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.3352" x="3178.2046" y="3492.2531">theme-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.2412" x="3192.7516" y="3509.9592">theme-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.1742" x="3167.785" y="3527.6652">connector end-to-end semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.4612" x="3167.1416" y="3545.3712">connector-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.0032" x="3149.3705" y="3563.0772">connector-integrated consumer semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.9822" x="3179.3811" y="3580.7832">BrainWholeChainIntegrationLaw,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.0922" x="3169.826" y="3598.4892">and BrainPhysicsHandoffPromotion.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="434.6943" x="3063.525" y="3616.1953">The remaining blocker is no longer absence of whole-chain integration.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="513.3443" x="3024.2" y="3633.9013">The current gap is aggregate/import governance and any future stronger consumer</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="406.1203" x="3077.812" y="3651.6073">that would exceed the bounded I_chain / H_phys handoff surfaces.</text></g><g class="entity" data-qualified-name="GMN173" data-source-line="280" id="ent0174"><path d="M6902.23,331.2379 L6902.23,376.356 A9,9 0 0 0 6911.23,385.356 L7013.93,385.356 L7017.93,439