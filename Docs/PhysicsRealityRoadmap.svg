thAdjust="spacing" textLength="218.3352" x="1867.761" y="4137.1109">formal geometric/closure structure.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.4772" x="1848.69" y="4154.817">Closest to spacetime-formalism language,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.1192" x="1865.369" y="4172.523">not yet to full atom-by-atom physics.</text></g><g class="entity" data-qualified-name="GMN180" data-source-line="237" id="ent0181"><path d="M922.34,622.5079 L922.34,685.332 A9,9 0 0 0 931.34,694.332 L1237.7993,694.332 A9,9 0 0 0 1246.7993,685.332 L1246.7993,623.5079 L1236.7993,613.5079 L931.34,613.5079 A9,9 0 0 0 922.34,622.5079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1236.7993,613.5079 L1236.7993,619.0079 A4.5,4.5 0 0 0 1241.2993,623.5079 L1246.7993,623.5079 L1236.7993,613.5079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="109.7201" x="1025.2096" y="632.4049">Programmer rule:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.4593" x="928.34" y="650.1109">red items are not TODO comments to hand-wave.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.0073" x="940.066" y="667.817">They need named modules, fields, and checks</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="232.1672" x="963.986" y="685.523">before diagrams should recolor them.</text></g><g class="entity" data-qualified-name="GMN183" data-source-line="244" id="ent0184"><path d="M896.52,488.6579 L896.52,569.188 A9,9 0 0 0 905.52,578.188 L1263.6023,578.188 A9,9 0 0 0 1272.6023,569.188 L1272.6023,489.6579 L1262.6023,479.6579 L905.52,479.6579 A9,9 0 0 0 896.52,488.6579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1262.6023,479.6579 L1262.6023,485.1579 A4.5,4.5 0 0 0 1267.1023,489.6579 L1272.6023,489.6579 L1262.6023,479.6579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.2532" x="966.4346" y="498.5549">CoreSpine explains why several lanes</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.4282" x="950.3471" y="516.2609">share the same ternary carrier vocabulary.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="355.0823" x="902.52" y="533.967">It is a typed bridge and diagrammatic interpretation layer,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.7732" x="979.1746" y="551.673">not a solved unification theorem.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="270.7122" x="944.705" y="569.379">Concrete contraction still needs a certificate.</text></g><g class="entity" data-qualified-name="GMN186" data-source-line="252" id="ent0187"><path d="M6771.61,1857.3579 L6771.61,1902.476 A9,9 0 0 0 6780.61,1911.476 L7255.2504,1911.476 A9,9 0 0 0 7264.2504,1902.476 L7264.2504,1858.3579 L7254.2504,1848.3579 L6780.61,1848.3579 A9,9 0 0 0 6771.61,1857.3579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M7254.2504,1848.3579 L7254.2504,1853.8579 A4.5,4.5 0 0 0 7258.7504,1858.3579 L7264.2504,1858.3579 L7254.2504,1848.3579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.0493" x="6865.4056" y="1867.2549">This is where the public story needed correction:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="257.5562" x="6884.6521" y="1884.9609">not solved, no longer "missing from zero",</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="471.6404" x="6777.61" y="1902.667">and now blocked on named seam hypotheses rather than vague future work.</text></g><g class="entity" data-qualified-name="GMN189" data-source-line="258" id="ent0190"><path d="M1811.2,568.9479 L1811.2,684.89 A9,9 0 0 0 1820.2,693.89 L2142.6493,693.89 A9,9 0 0 0 2151.6493,684.89 L2151.6493,569.9479 L2141.6493,559.9479 L1820.2,559.9479 A9,9 0 0 0 1811.2,568.9479" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2141.6493,559.9479 L2141.6493,565.4479 A4.5,4.5 0 0 0 2146.1493,569.9479 L2151.6493,569.9479 L2141.6493,559.9479" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="299.8713" x="1826.989" y="578.8449">Closest current contact with experimental reality:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.0262" x="1820.9115" y="596.5509">photonuclear / collider measurement organization.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.4493" x="1817.2" y="614.257">This is useful, but it is not the same as deriving QCD,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.6673" x="1825.091" y="631.963">and it is not the only atom/nuclear-facing surface.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.8752" x="1850.987" y="649.669">Current empirical adequacy is not closed:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.2752" x="1839.287" y="667.375">chi2 and orbit-shell surfaces do not yet prove</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="233.2072" x="1860.321" y="685.081">fixed-point prediction of observations.</text></g><g class="entity" data-qualified-name="GMN192" data-source-line="268" id="ent0193"><path d="M1794.39,399.9479 L1794.39,515.89 A9,9 0 0 0 1803.39,524.89 L2159.4573,524.89 A9,9 0 0 0 2168.4573,515.89 L2168.4573,400.9479 L2158.4573,390.9479 L1803.39,390.9479 A9,9 0 0 0 1794.39,399.9479" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2158.4573,390.9479 L2158.4573,396.4479 A4.5,4.5 0 0 0 2162.9573,400.9479 L2168.4573,400.9479 L2158.4573,390.9479" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.5281" x="1920.6596" y="409.8449">Safe music bridge:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="135.7201" x="1909.0636" y="427.5509">Z12 ~= Z3 x Z4 by CRT.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.0541" x="1904.3966" y="445.257">MusicalAttractor target:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.5253" x="1844.161" y="462.963">K_music projects to a chosen diatonic scale,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="353.0673" x="1800.39" y="480.669">L_music is chromatic dissonance, and descent is one-step.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.8773" x="1823.985" y="498.375">Do not claim the perfect fifth shift gives a Z3 orbit;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.4991" x="1902.6741" y="516.081">+7 mod 12 has order 12.</text></g><g class="entity" data-qualified-name="GMN195" data-source-line="278" id="ent0196"><path d="M870.52,354.6579 L870.52,435.188 A9,9 0 0 0 879.52,444.188 L1289.6023,444.188 A9,9 0 0 0 1298.6023,435.188 L1298.6023,355.6579 L1288.6023,345.6579 L879.52,345.6579 A9,9 0 0 0 870.52,354.6579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1288.6023,345.6579 L1288.6023,351.1579 A4.5,4.5 0 0 0 1293.1023,355.6579 L1298.6023,355.6579 L1288.6023,345.6579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="334.1002" x="913.011" y="364.5549">These adjacent lanes matter for roadmap truthfulness.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="341.1462" x="909.488" y="382.2609">They widen the program beyond the core physics spine,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="380.0293" x="890.0465" y="399.967">but they do not upgrade the current repo to solved unification</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="328.7442" x="915.689" y="417.673">or to local theorem closure on brain/crossover claims.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="407.0823" x="876.52" y="435.379">The blocker boxes are intentionally separate from the lane objects.</text></g><g class="entity" data-qualified-name="GMN198" data-source-line="286" id="ent0199"><path d="M3018.2,1601.2979 L3018.2,2000.5363 A9,9 0 0 0 3027.2,2009.5363 L3543.5443,2009.5363 A9,9 0 0 0 3552.5443,2000.5363 L3552.5443,1602.2979 L3542.5443,1592.2979 L3027.2,1592.2979 A9,9 0 0 0 3018.2,1601.2979" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M3542.5443,1592.2979 L3542.5443,1597.7979 A4.5,4.5 0 0 0 3547.0443,1602.2979 L3552.5443,1602.2979 L3542.5443,1592.2979" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="246.3112" x="3157.7165" y="1611.1949">This path is now explicit in the roadmap:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="440.5313" x="3060.6065" y="1628.9009">brain -&gt; brain-DNA -&gt; DNA/chemistry -&gt; physics-facing chemistry carrier.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="314.8863" x="3123.429" y="1646.607">It is also now consumed by bounded local modules,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="274.2612" x="3143.7415" y="1664.313">including bounded representation semantics</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.4262" x="3158.659" y="1682.019">bounded representation transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.9792" x="3154.8825" y="1699.725">bounded representation semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.0222" x="3159.361" y="1717.431">bounded representation semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.3412" x="3123.2016" y="1735.137">bounded representation-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.2473" x="3137.7485" y="1752.8431">bounded representation-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.0992" x="3198.8226" y="1770.5491">connector semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.0692" x="3161.8375" y="1788.2551">theme-to-chemistry/channel transport,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="193.9342" x="3183.9051" y="1805.9611">theme semantic-transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.0052" x="3174.3695" y="1823.6671">theme end-to-end semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.3352" x="3178.2046" y="1841.3731">theme-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.2412" x="3192.7516" y="1859.0792">theme-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.1742" x="3167.785" y="1876.7852">connector end-to-end semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.4612" x="3167.1416" y="1894.4912">connector-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.0032" x="3149.3705" y="1912.1972">connector-integrated consumer semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.9822" x="3179.3811" y="1929.9032">BrainWholeChainIntegrationLaw,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.0922" x="3169.826" y="1947.6092">and BrainPhysicsHandoffPromotion.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="434.6943" x="3063.525" y="1965.3153">The remaining blocker is no longer absence of whole-chain integration.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="513.3443" x="3024.2" y="1983.0213">The current gap is aggregate/import governance and any future stronger consumer</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="406.1203" x="3077.812" y="2000.7273">that would exceed the bounded I_chain / H_phys handoff surfaces.</text></g><g class="entity" data-qualified-name="GMN201" data-source-line="312" id="ent0202"><path d="M6902.23,1955.3579 L6902.23,2000.476 A9,9 0 0 0 6911.23,2009.476 L7124.6222,2009.476 A9,9 0 0 0 7133.6222,2000.476 L7133.6222,1956.3579 L7123.6222,1946.3579 L6911.23,1946.3579 A9,9 0 0 0 6902.23,1955.3579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M7123.6222,1946.3579 L7123.6222,1951.8579 A4.5,4.5 0 0 0 7128.1222,1956.3579 L7133.6222,1956.3579 L7123.6222,1946.3579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.2791" x="6938.7865" y="1965.2549">This is the bar for saying</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="158.8991" x="6933.9765" y="1982.9609">"serious unification claim"</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210.3922" x="6908.23" y="2000.667">without overclaiming final closure.</text></g><!--link RealityLight to FormalQM--><g class="link" data-entity-1="ent0003" data-entity-2="ent0008" data-link-type="dependency" data-source-line="116" id="lnk70"><path d="M256.65,4432.2479 C287.03,4431.7079 321.73,4431.1879 353.31,4430.9179 C491.08,4429.7679 525.55,4428.6279 663.31,4430.9179 C775.17,4432.7779 897.7149,4437.1857 982.8749,4440.6257" fill="none" id="RealityLight-to-FormalQM" style="stroke:#181818;stroke-width:2;"/><polygon fill="#181818" points="988.87,4440.8679,980.0388,4436.5079,983.8741,4440.6661,979.7159,4444.5014,988.87,4440.8679" style="stroke:#181818;stroke-width:2;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.6342" x="431.81" y="4425.4949">textbook quantum optics</text></g><!--link RealityLight to FormalQFT--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-link-type="dependency" data-source-l