.2953" x="10374.3529" y="1087.291">with its own explicit blocker box kept separate from the lane object,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.5892" x="10454.7059" y="1104.997">but neither is local theorem closure here.</text></g><g class="entity" data-qualified-name="GMN174" data-source-line="257" id="ent0175"><path d="M8772.85,415.5179 L8772.85,779.3443 A9,9 0 0 0 8781.85,788.3443 L9110.1493,788.3443 A9,9 0 0 0 9119.1493,779.3443 L9119.1493,416.5179 L9109.1493,406.5179 L8781.85,406.5179 A9,9 0 0 0 8772.85,415.5179" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M9109.1493,406.5179 L9109.1493,412.0179 A4.5,4.5 0 0 0 9113.6493,416.5179 L9119.1493,416.5179 L9109.1493,406.5179" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.3842" x="8840.3075" y="425.4149">This is the clearest currently local</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.4883" x="8814.2555" y="443.1209">brain -&gt; DNA -&gt; chemistry -&gt; physics path.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245.5052" x="8818.747" y="460.827">It is now explicit and consumed through</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.2993" x="8778.85" y="478.533">theme transport, bounded representation semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.4262" x="8819.2865" y="496.239">bounded representation transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.9792" x="8815.51" y="513.945">bounded representation semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.0222" x="8819.9885" y="531.651">bounded representation semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.3412" x="8783.829" y="549.357">bounded representation-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.2473" x="8798.376" y="567.0631">bounded representation-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.9022" x="8847.5485" y="584.7691">codec/chemistry consumption,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.0992" x="8859.45" y="602.4751">connector semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.0692" x="8822.465" y="620.1811">theme-to-chemistry/channel transport,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="193.9342" x="8844.5325" y="637.8871">theme semantic-transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.0052" x="8834.997" y="655.5931">theme end-to-end semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.3352" x="8838.832" y="673.2992">theme-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.2412" x="8853.379" y="691.0052">theme-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.1742" x="8828.4125" y="708.7112">connector end-to-end semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.4612" x="8827.769" y="726.4172">connector-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.0032" x="8809.998" y="744.1232">connector-integrated consumer semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.3152" x="8822.842" y="761.8292">and a bounded physics-facing handoff,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.2382" x="8854.8805" y="779.5353">but it remains theorem-thin.</text></g><g class="entity" data-qualified-name="GMN177" data-source-line="281" id="ent0178"><path d="M8799.34,2490.5279 L8799.34,2553.352 A9,9 0 0 0 8808.34,2562.352 L9175.6652,2562.352 A9,9 0 0 0 9184.6652,2553.352 L9184.6652,2491.5279 L9174.6652,2481.5279 L8808.34,2481.5279 A9,9 0 0 0 8799.34,2490.5279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M9174.6652,2481.5279 L9174.6652,2487.0279 A4.5,4.5 0 0 0 9179.1652,2491.5279 L9184.6652,2491.5279 L9174.6652,2481.5279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="215.2412" x="8879.882" y="2500.4249">This is the live non-claim boundary.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.8272" x="8872.589" y="2518.1309">The repo is not entitled to cross it yet.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.3252" x="8805.34" y="2535.837">Several lanes are now advanced or explicitly blocker-bound,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.7071" x="8913.149" y="2553.543">not "missing from zero."</text></g><!--link FormalCore to BridgeLayers--><g class="link" data-entity-1="ent0003" data-entity-2="ent0032" data-link-type="dependency" data-source-line="112" id="lnk64"><path d="M3658.76,989.4079 C3692,962.1979 3737.35,930.9079 3784,