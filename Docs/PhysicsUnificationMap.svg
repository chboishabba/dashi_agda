.2679 L8321.1072,1073.7679 A4.5,4.5 0 0 0 8325.6072,1078.2679 L8331.1072,1078.2679 L8321.1072,1068.2679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131.7291" x="8073.5791" y="1087.1649">Important correction:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="353.3272" x="7962.78" y="1104.8709">some recovery structure is already theorem-bearing here.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.2003" x="8006.8435" y="1122.577">The open gap is stronger physical recovery,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.7112" x="8024.088" y="1140.283">not total absence of bridge theorems.</text></g><g class="entity" data-qualified-name="GMN135" data-source-line="197" id="ent0136"><path d="M8688.82,1077.2679 L8688.82,1140.092 A9,9 0 0 0 8697.82,1149.092 L9008.0622,1149.092 A9,9 0 0 0 9017.0622,1140.092 L9017.0622,1078.2679 L9007.0622,1068.2679 L8697.82,1068.2679 A9,9 0 0 0 8688.82,1077.2679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M9007.0622,1068.2679 L9007.0622,1073.7679 A4.5,4.5 0 0 0 9011.5622,1078.2679 L9017.0622,1078.2679 L9007.0622,1068.2679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.2422" x="8694.82" y="1087.1649">Useful for calibration and interpretation contracts.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.0202" x="8721.431" y="1104.8709">Not evidence of theorem closure by itself.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.8642" x="8708.509" y="1122.577">Current chi2 audit reports a carrier mismatch;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.9113" x="8704.4855" y="1140.283">current B4 shell comparison is standaloneOnly.</text></g><g class="entity" data-qualified-name="GMN138" data-source-line="204" id="ent0139"><path d="M8366.02,1068.4179 L8366.02,1148.948 A9,9 0 0 0 8375.02,1157.948 L8644.8713,1157.948 A9,9 0 0 0 8653.8713,1148.948 L8653.8713,1069.4179 L8643.8713,1059.4179 L8375.02,1059.4179 A9,9 0 0 0 8366.02,1068.4179" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M8643.8713,1059.4179 L8643.8713,1064.9179 A4.5,4.5 0 0 0 8648.3713,1069.4179 L8653.8713,1069.4179 L8643.8713,1059.4179" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.8072" x="8394.042" y="1078.3149">Music target is precise but bounded:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.1282" x="8415.3816" y="1096.0209">Z12 carrier, chromatic metric,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225.4852" x="8392.703" y="1113.727">K_music projection, L_music descent.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="266.8513" x="8372.02" y="1131.433">No perception, uniqueness, Monster-prime,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.3042" x="8405.2936" y="1149.139">or physics-closure claim is made.</text></g><g class="entity" data-qualified-name="GMN141" data-source-line="212" id="ent0142"><path d="M9356.23,1041.8579 L9356.23,1175.506 A9,9 0 0 0 9365.23,1184.506 L10212.6711,1184.506 A9,9 0 0 0 10221.6711,1175.506 L10221.6711,1042.8579 L10211.6711,1032.8579 L9365.23,1032.8579 A9,9 0 0 0 9356.23,1041.8579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M10211.6711,1032.8579 L10211.6711,1038.3579 A4.5,4.5 0 0 0 10216.1711,1042.8579 L10221.6711,1042.8579 L10211.6711,1032.8579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.0301" x="9717.4355" y="1051.7549">Important scope split:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="295.9452" x="9636.4779" y="1069.4609">the DNA lane is now genuinely localized in Agda,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.6043" x="9625.1484" y="1087.167">but it is not itself a physics-unification theorem lane.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="645.2943" x="9461.8034" y="1104.873">The brain lane now has theorem-thin local owner/summary/extraction/invariant/invariant-depth surfaces,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="532.8052" x="9518.0479" y="1122.579">while its richer archive-backed brain themes are kept separate in explicit blocker boxes,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="844.4411" x="9362.23" y="1140.285">and the crossover lane now has partial local owner/compatibility/law/consumer/connector/depth/semantic/composition/payload surfaces,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="412.2953" x="9578.3029" y="1157.991">with its own explicit blocker box kept separate from the lane object,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.5892" x="9658.6559" y="1175.697">but neither is local theorem closure here.</text></g><g class="entity" data-qualified-name="GMN144" data-source-line="223" id="ent0145"><path d="M8442.8,486.2179 L8442.8,850.0443 A9,9 0 0 0 8451.8,859.0443 L8780.0993,859.0443 A9,9 0 0 0 8789.0993,850.0443 L8789.0993,487.2179 L8779.0993,477.2179 L8451.8,477.2179 A9,9 0 0 0 8442.8,486.2179" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M8779.0993,477.2179 L8779.0993,482.7179 A4.5,4.5 0 0 0 8783.5993,487.2179 L8789.0993,487.2179 L8779.0993,477.2179" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.3842" x="8510.2575" y="496.1149">This is the clearest currently local</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.4883" x="8484.2055" y="513.8209">brain -&gt; DNA -&gt; chemistry -&gt; physics path.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245.5052" x="8488.697" y="531.527">It is now explicit and consumed through</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.2993" x="8448.8" y="549.233">theme transport, bounded representation semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.4262" x="8489.2365" y="566.939">bounded representation transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.9792" x="8485.46" y="584.645">bounded representation semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.0222" x="8489.9385" y="602.351">bounded representation semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.3412" x="8453.779" y="620.057">bounded representation-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.2473" x="8468.326" y="637.7631">bounded representation-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.9022" x="8517.4985" y="655.4691">codec/chemistry consumption,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.0992" x="8529.4" y="673.1751">connector semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.0692" x="8492.415" y="690.8811">theme-to-chemistry/channel transport,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="193.9342" x="8514.4825" y="708.5871">theme semantic-transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.0052" x="8504.947" y="726.2931">theme end-to-end semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.3352" x="8508.782" y="743.9992">theme-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.2412" x="8523.329" y="761.7052">theme-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.1742" x="8498.3625" y="779.4112">connector end-to-end semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.4612" x="8497.719" y="797.1172">connector-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.0032" x="8479.948" y="814.8232">connector-integrated consumer semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.3152" x="8492.792" y="832.5292">and a bounded physics-facing handoff,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.2382" x="8524.8305" y="850.2353">but it remains theorem-thin.</text></g><g class="entity" data-qualified-name="GMN147" data-source-line="247" id="ent0148"><path d="M1038.28,2561.2279 L1038.28,2624.052 A9,9 0 0 0 1047.28,2633.052 L1414.6052,2633.052 A9,9 0 0 0 1423.6052,2624.052 L1423.6052,2562.2279 L1413.6052,2552.2279 L1047.28,2552.2279 A9,9 0 0 0 1038.28,2561.2279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1413.6052,2552.2279 L1413.6052,2557.7279 A4.5,4.5 0 0 0 1418.1052,2562.2279 L1423.6052,2562.2279 L1413.6052,2552.2279" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="215.2412" x="1118.822" y="2571.1249">This is the live non-claim boundary.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.8272" x="1111.529" y="2588.8309">The repo is not entitled to cross it yet.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.3252" x="1044.28" y="2606.537">Several lanes are now advanced or explicitly blocker-bound,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.7071" x="1152.089" y="2624.243">not "missing from zero."</text></g><!--link FormalCore to BridgeLayers--><g class="link" data-entity-1="ent0003" data-entity-2="ent0018" data-link-type="dependency" data-source-line="94" id="lnk50"><path d="M5361.12,1087.6979 C5141.12,1058.2579 4719.06,1006.1579 4357.95,987.2079 C4165.21,977.0879 1069.69,934.7679 883.95,987.2079 C833.1,1001.5579 787.2928,1029.4856 749.9428,1056.8056" fill="none" id="FormalCore-to-BridgeLayers" style="stroke:#181818;stroke-width:2;"/><polygon fill="#181818" points="745.1,1060.3479,754.7257,1058.263,749.1356,1057.396,750.0026,1051.806,745.1,1060.3479" style="stroke:#181818;stroke-width:2;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="101.4261" x="4666.45" y="9