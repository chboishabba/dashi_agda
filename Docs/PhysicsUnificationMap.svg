 textLength="295.9452" x="12641.5279" y="1083.4509">the DNA lane is now genuinely localized in Agda,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.6043" x="12630.1984" y="1101.157">but it is not itself a physics-unification theorem lane.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="645.2943" x="12466.8534" y="1118.863">The brain lane now has theorem-thin local owner/summary/extraction/invariant/invariant-depth surfaces,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="532.8052" x="12523.0979" y="1136.569">while its richer archive-backed brain themes are kept separate in explicit blocker boxes,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="844.4411" x="12367.28" y="1154.275">and the crossover lane now has partial local owner/compatibility/law/consumer/connector/depth/semantic/composition/payload surfaces,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="412.2953" x="12583.3529" y="1171.981">with its own explicit blocker box kept separate from the lane object,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.5892" x="12663.7059" y="1189.687">but neither is local theorem closure here.</text></g><g class="entity" data-qualified-name="GMN176" data-source-line="260" id="ent0177"><path d="M11427.85,500.2079 L11427.85,864.0343 A9,9 0 0 0 11436.85,873.0343 L11765.1493,873.0343 A9,9 0 0 0 11774.1493,864.0343 L11774.1493,501.2079 L11764.1493,491.2079 L11436.85,491.2079 A9,9 0 0 0 11427.85,500.2079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M11764.1493,491.2079 L11764.1493,496.7079 A4.5,4.5 0 0 0 11768.6493,501.2079 L11774.1493,501.2079 L11764.1493,491.2079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.3842" x="11495.3075" y="510.1049">This is the clearest currently local</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.4883" x="11469.2555" y="527.8109">brain -&gt; DNA -&gt; chemistry -&gt; physics path.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245.5052" x="11473.747" y="545.517">It is now explicit and consumed through</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.2993" x="11433.85" y="563.223">theme transport, bounded representation semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.4262" x="11474.2865" y="580.929">bounded representation transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.9792" x="11470.51" y="598.635">bounded representation semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.0222" x="11474.9885" y="616.341">bounded representation semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.3412" x="11438.829" y="634.047">bounded representation-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.2473" x="11453.376" y="651.7531">bounded representation-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.9022" x="11502.5485" y="669.4591">codec/chemistry consumption,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.0992" x="11514.45" y="687.1651">connector semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.0692" x="11477.465" y="704.8711">theme-to-chemistry/channel transport,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="193.9342" x="11499.5325" y="722.5771">theme semantic-transport laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.0052" x="11489.997" y="740.2831">theme end-to-end semantic-depth,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.3352" x="11493.832" y="757.9892">theme-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.2412" x="11508.379" y="775.6952">theme-integrated semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.1742" x="11483.4125" y="793.4012">connector end-to-end semantic-laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.4612" x="11482.769" y="811.1072">connector-consumer semantics/laws,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.0032" x="11464.998" y="828.8132">connector-integrated consumer semantics,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.3152" x="11477.842" y="846.5192">and a bounded physics-facing handoff,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.2382" x="11509.8805" y="864.2253">but it remains theorem-thin.</text></g><g class="entity" data-qualified-name="GMN179" data-source-line="284" id="ent0180"><path d="M1297.34,2575.2179 L1297.34,2638.042 A9,9 0 0 0 1306.34,2647.042 L1673.6652,2647.042 A9,9 0 0 0 1682.6652,2638.042 L1682.6652,2576.2179 L1672.6652,2566.2179 L1306.34,2566.2179 A9,9 0 0 0 1297.34,2575.2179" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1672.6652,2566.2179 L1672.6652,2571.7179 A4.5,4.5 0 0 0 1677.1652,2576.2179 L1682.6652,2576.2179 L1672.6652,2566.2179" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="215.2412" x="1377.882" y="2585.1149">This is the live non-claim boundary.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.8272" x="1370.589" y="2602.8209">The repo is not entitled to cross it yet.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.3252" x="1303.34" y="2620.527">Several lanes are now advanced or explicitly blocker-bound,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.7071" x="1411.149" y="2638.233">not "missing from zero."</text></g><!--link FormalCore to BridgeLayers--><g class="link" data-entity-1="ent0003" data-entity-2="ent0032" data-link-type="dependency" data-source-line="113" id="lnk65"><path d="M7450.24,1074.0979 C7417,1046.8879 7371.65,1015.5979 7325,1001.1979 C7179.98,956.4279 6792.59,982.2079 6642,1001.1979 C6531.48,1015.1279 6415.5715,1044.9491 6323.1815,1072.3991" fill="none" id="FormalCore-to-BridgeLayers" style="stroke:#181818;stroke-width:2;"/><polygon fill="#181818" points="6317.43,1074.1079,6327.1965,1075.379,6322.2229,1072.6839,6324.918,1067.7103,6317.43,1074.1079" style="stroke:#181818;stroke-width:2;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="101.4261" x="6374.5" y="984.8949">formal transport</text></g><!--link StateClosed to FormalCore--><g class="link" data-entity-1="ent0005" data-entity-2="ent0003" data-link-type="dependency" data-source-line="114" id="lnk66"><path d="M6136.72,740.1479 C6144.81,811.9879 6170.49,932.8079 6252,988.9979 C6276.54,1005.9179 7296.61,987.9279 7325,996.997