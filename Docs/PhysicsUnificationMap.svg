A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="209.3412" x="7018.3267" y="2527.3689">IIT Phi, market self-observation,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="175.4753" x="7035.2596" y="2546.4368">and reality-self-description</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="278.6129" x="6983.6908" y="2565.5047">readings are scale-unification fixtures only</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="225.0071" x="7010.4937" y="2584.5726">Need: typed carriers at each scale,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="243.4451" x="7001.2748" y="2603.6405">scale maps, observable preservation,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="288.5389" x="6978.7278" y="2622.7084">temporal/spacetime sections/gluing/metric,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="221.2271" x="7012.3837" y="2641.7764">Time/Space containment carriers,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="203.4612" x="7021.2667" y="2660.8443">evolution-validity preservation,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="298.1149" x="6973.9399" y="2679.9122">measurement protocols, empirical validation,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="259.419" x="6993.2878" y="2698.9801">biomedical validation where applicable,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="263.269" x="6991.3628" y="2718.048">market/risk validation where applicable,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="202.5792" x="7021.7077" y="2737.1159">and clinical non-authority flags</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="125.3835" x="7060.3055" y="2756.1839">[claim governance]</text></g><g class="entity" data-qualified-name="GMN153" data-source-line="203" id="ent0154"><path d="M11376.27,1024.2779 L11376.27,1051.6899 A9,9 0 0 0 11385.27,1060.6899 L11636.7262,1060.6899 A9,9 0 0 0 11645.7262,1051.6899 L11645.7262,1025.2779 L11635.7262,1015.2779 L11385.27,1015.2779 A9,9 0 0 0 11376.27,1024.2779" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M11635.7262,1015.2779 L11635.7262,1020.7779 A4.5,4.5 0 0 0 11640.2262,1025.2779 L11645.7262,1025.2779 L11635.7262,1015.2779" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.2862" x="11421.855" y="1034.1749">This is the part to trust first.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="248.4562" x="11382.27" y="1051.8809">It carries the strongest current evidence.</text></g><g class="entity" data-qualified-name="GMN156" data-source-line="208" id="ent0157"><path d="M9154.56,574.8679 L9154.56,619.986 A9,9 0 0 0 9163.56,628.986 L9596.4313,628.986 A9,9 0 0 0 9605.4313,619.986 L9605.4313,575.8679 L9595.4313,565.8679 L9163.56,565.8679 A9,9 0 0 0 9154.56,574.8679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M9595.4313,565.8679 L9595.4313,571.3679 A4.5,4.5 0 0 0 9599.9313,575.8679 L9605.4313,575.8679 L9595.4313,565.8679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="240.7862" x="9255.1025" y="584.7649">This box is the anti-overclaim guardrail.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="429.8713" x="9160.56" y="602.4709">Team programmers should add code here as explicit theorem owners,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245.3102" x="9252.8405" y="620.177">not as extra prose on existing packages.</text></g><g class="entity" data-qualified-name="GMN159" data-source-line="214" id="ent0160"><path d="M10149.54,1278.3079 L10149.54,1394.25 A9,9 0 0 0 10158.54,1403.25 L10427.4552,1403.25 A9,9 0 0 0 10436.4552,1394.25 L10436.4552,1279.3079 L10426.4552,1269.3079 L10158.54,1269.3079 A9,9 0 0 0 10149.54,1278.3079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M10426.4552,1269.3079 L10426.4552,1274.8079 A4.5,4.5 0 0 0 10430.9552,1279.3079 L10436.4552,1279.3079 L10426.4552,1269.3079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.5301" x="10205.2325" y="1288.2049">CoreSpine is a bridge layer:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="221.2082" x="10177.8935" y="1305.9109">it exposes one typed ternary carrier,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.8961" x="10204.0495" y="1323.617">one agreement ultrametric,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="221.8322" x="10177.5815" y="1341.323">one contraction-certificate interface,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.0272" x="10170.984" y="1359.029">and the bounded CRT/J scalar channel.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="236.8082" x="10170.0935" y="1376.735">It does not discharge concrete descent</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.9152" x="10155.54" y="1394.441">or prove biology/chemistry/physics closure.</text></g><g class="entity" data-qualified-name="GMN162" data-source-line="224" id="ent0163"><path d="M11680.84,1006.5679 L11680.84,1069.392 A9,9 0 0 0 11689.84,1078.392 L12046.1672,1078.392 A9,9 0 0 0 12055.1672,1069.392 L12055.1672,1007.5679 L12045.1672,997.5679 L11689.84,997.5679 A9,9 0 0 0 11680.84,1006.5679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M12045.1672,997.5679 L12045.1672,1003.0679 A4.5,4.5 0 0 0 12049.6672,1007.5679 L12055.1672,1007.5679 L12045.1672,997.5679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131.7291" x="11797.6391" y="1016.4649">Important correction:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="353.3272" x="11686.84" y="1034.1709">some recovery structure is already theorem-bearing here.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.2003" x="11730.9035" y="1051.877">The open gap is stronger physical recovery,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.7112" x="11748.148" y="1069.583">not total absence of bridge theorems.</text></g><g class="entity" data-qualified-name="GMN165" data-source-line="231" id="ent0166"><path d="M12089.88,1006.5679 L12089.88,1069.392 A9,9 0 0 0 12098.88,1078.392 L12409.1222,1078.392 A9,9 0 0 0 12418.1222,1069.392 L12418.1222,1007.5679 L12408.1222,997.5679 L12098.88,997.5679 A9,9 0 0 0 12089.88,1006.5679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M12408.1222,997.5679 L12408.1222,1003.0679 A4.5,4.5 0 0 0 12412.6222,1007.5679 L12418.1222,1007.5679 L12408.1222,997.5679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.2422" x="1209