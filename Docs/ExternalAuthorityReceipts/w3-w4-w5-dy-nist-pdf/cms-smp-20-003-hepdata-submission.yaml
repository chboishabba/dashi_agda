description: The measured differential cross section in the $350 \le M_{ll} < 1000$
  GeV mass window, in bins of the $\varphi^*$ variable, divided by the measured differential
  cross section in the $76 \le M_{ll} < 106$ GeV mass window. At least one jet is
  required. The values are not normalized by the bin width.
keywords:
- name: reactions
  values:
  - P P --> GAMMA* --> LEPTON+ LEPTON-
  - P P --> GAMMA* --> E+ E-
  - P P --> GAMMA* --> MU+ MU-
  - P P --> Z --> LEPTON+ LEPTON-
  - P P --> Z --> E+ E-
  - P P --> Z --> MU+ MU-
- name: cmenergies
  values:
  - 13000
- name: phrases
  values:
  - Cross Section
  - Single Differential Cross Section
  - Drell Yan
  - Z Production
  - Di-Muon Production
  - Transverse Momentum Dependence
- name: observables
  values:
  - DSIG/DPHISTAR / DSIG/DPHISTAR
location: Figure 22 bottom right
name: phistar mass 350-1000 over mass 76-106
