abited Paper 1 surfaces.G6" data-source-line="39" id="ent0009"><rect fill="#DCFCE7" height="77.2038" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="266.0911" x="295.95" y="611.6779"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.7256" x="373.6327" y="636.6439">G6 tracked route</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="246.0911" x="305.95" y="655.7118">cross-lane commuting on tracked API</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="204.9732" x="326.5089" y="674.7797">old universal route still blocked</text></g><!--entity G3--><g class="entity" data-qualified-name="Current inhabited Paper 1 surfaces.G3" data-source-line="40" id="ent0010"><rect fill="#DCFCE7" height="77.2038" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="266.3571" x="863.82" y="611.6779"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="151.3674" x="921.3148" y="636.6439">G3 finite-support route</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="246.3571" x="873.82" y="655.7118">certified selected subtraction support</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="244.4951" x="874.751" y="674.7797">associated-graded quotient still open</text></g><!--entity E8--><g class="entity" data-qualified-name="Current inhabited Paper 1 surfaces.E8" data-source-line="41" id="ent0011"><rect fill="#DCFCE7" height="77.2038" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="238.7632" x="22.62" y="611.6779"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="116.7735" x="83.6148" y="636.6439">E8/LILA boundary</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="208.2352" x="37.884" y="655.7118">integer/local semantic evidence</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="218.7632" x="32.62" y="674.7797">upstream promotion still blocked</text></g><!--entity W3--><g class="entity" data-qualified-name="Empirical contact and diagnostics.W3" data-source-line="45" id="ent0013"><rect fill="#D1FAE5" height="77.2038" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="237.5171" x="1536.24" y="429.4679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="197.5672" x="1556.215" y="454.4339">Bounded W3 Drell-Yan receipt</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="217.5171" x="1546.24" y="473.5018">HEPData t43/t44, chi2/dof 2.1565</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="200.3812" x="1554.8079" y="492.5697">passes local threshold 4.0 only</text></g><!--entity StrictDY--><g class="entity" data-qualified-name="Empirical contact and diagnostics.StrictDY" data-source-line="46" id="ent0014"><rect fill="#FEE2E2" height="96.2717" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="246.6871" x="1535.66" y="602.1379"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="175.8533" x="1571.0769" y="627.1039">Strict Drell-Yan diagnostics</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="119.3915" x="1599.3078" y="646.1718">chi2/dof &lt;= 2 fails;</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="166.4314" x="1575.7879" y="665.2397">strict log-covariance fails;</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="226.6871" x="1545.66" y="684.3076">log-linear residual mode identified</text></g><!--entity W45--><g class="entity" data-qualified-name="Empirical contact and diagnostics.W45" data-source-line="47" id="ent0015"><rect fill="#FECACA" height="77.2038" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="268.457" x="1535.77" y="801.4079"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="163.9533" x="1588.0218" y="826.3739">W4/W5 convention gates</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="248.457" x="1545.77" y="845.4418">accepted DY luminosity/PDF authority</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="77.2237" x="1631.3867" y="864.5097">still missing</text></g><!--entity W3Block--><g class="entity" data-qualified-name="Explicit obstruction frontier.W3Block" data-source-line="51" id="ent0017"><rect fill="#FECACA" height="58.1358" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="248.4791" x="1181.76" y="810.9479"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="228.4791" x="1191.76" y="835.9139">No accepted external W3 authority</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="199.4012" x="1206.2989" y="854.9818">constructorless token remains</text></g><!--entity CalBlock--><g class="entity" data-qualified-name="Explicit obstruction frontier.CalBlock" data-source-line="52" id="ent0018"><rect fill="#FECACA" height="77.2038" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="229.2432" x="917.38" y="801.4079"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="149.1274" x="957.4379" y="826.3739">No physical calibration</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="209.2432" x="927.38" y="845.4418">no W4 adequacy, stress-energy,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="93.2676" x="985.3678" y="864.5097">or sourced GR</text></g><!--entity FullBlock--><g class="entity" data-qualified-name="Explicit obstruction frontier.FullBlock" data-source-line="53" id="ent0019"><rect fill="#FECACA" height="77.2038" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="233.4712" x="649.26" y="801.4079"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="142.4074" x="694.7919" y="826.3739">No full recovery claim</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="195.6492" x="668.171" y="845.4418">no Schwarzschild, continuum,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="213.4712" x="659.26" y="864.5097">GRQFT, or completed unification</text></g><!--entity Provenance--><g class="entity" data-qualified-name="Routed future material.Provenance" data-source-line="57" id="ent0021"><rect fill="#FEF3C7" height="77.2038" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="223.3632" x="963.32" y="85.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.8395" x="1011.5819" y="110.0339">Carrier provenance</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="203.3632" x="973.32" y="129.1018">JMD / 15 SSP / Monster context</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.9496" x="1019.5268" y="148.1697">background only</text></g><!--entity Compression--><g class="entity" data-qualified-name="Routed future material.Compression" data-source-line="58" id="ent0022"><rect fill="#FEF3C7" height="77.2038" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="212.5833" x="715.71" y="85.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="192.5833" x="725.71" y="110.0339">Compression and refinement</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.0414" x="751.9809" y="129.1018">UFT-C, Hensel/p-adic,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="179.0733" x="732.465" y="148.1697">Markov-after-quotient view</text></g><!--entity Outlook--><g class="entity" data-qualified-name="Routed future material.Outlook" data-source-line="59" id="ent0023"><rect fill="#FFF7ED" height="77.2038" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="241.8291" x="1222.09" y="85.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="145.1515" x="1270.4288" y="110.0339">Cross-domain outlook</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="221.8291" x="1232.09" y="129.1018">chemistry, DNA/brain/perception,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="189.3773" x="1248.3159" y="148.1697">orbit-shell/signature families</text></g><!--entity Thesis--><g class="entity" data-qualified-name="Thesis" data-source-line="29" id="ent0002"><rect fill="#DBEAFE" height="77.2038" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="289.289" x="29.36" y="85.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="164.4854" x="91.7618" y="110.0339">Physics-unification thesis</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="269.289" x="39.36" y="129.1018">one carrier program, many closure gates</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="135.1275" x="106.4408" y="148.1697">[not completed TOE]</text></g><!--entity Takeaway--><g class="entity" data-qualified-name="Takeaway" data-source-line="62" id="ent0024"><rect fill="#BBF7D0" height="96.2717" rx="7" ry="7" style="stroke:#334155;stroke-width:0.5;" width="370.6986" x="495.65" y="941.6179"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112.5176" x="624.7405" y="966.5839">Reader takeaway</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="328.5788" x="516.7099" y="985.6518">DASHI advances a constructive physics-unification</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="350.6986" x="505.65" y="1004.7197">architecture by showing inhabited surfaces and exact</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="319.9268" x="521.0359" y="1023.7876">remaining obligations in the same typed system.</text></g><g class="entity" data-qualified-name="GMN56" data-source-line="97" id="ent0057"><path d="M353.28,99.1079 L353.28,119.6679 L319.04,123.6679 L353.28,127.6679 L353.28,148.226 A7,7 0 0 0 360.28,155.226 L673.7293,155.226 A7,7 0 0 0 680.7293,148.226 L680.7293,102.1079 L670.7293,92.1079 L360.28,92.1079 A7,7 0 0 0 353.28,99.1079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M670.7293,92.1079 L670.7293,98.6079 A3.5,3.5 0 0 0 674.2293,102.1079 L680.7293,102.1079 L670.7293,92.1079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="109.3691" x="457.8201" y="111.0049">Public-facing rule:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.9452" x="416.532" y="128.7109">physics unification is the thesis;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="306.4493" x="359.28" y="146.417">typed governance is the enforcement mechanism.</text></g><g class="entity" data-qualified-name="GMN59" data-source-line="103" id="ent0060"><path d="M1836.31,625.7179 L1836.31,646.2779 L1782.75,650.2779 L1836.31,654.2779 L1836.31,674.836 A7,7 0 0 0 1843.31,681.836 L2134.6853,681.836 A7,7 0 0 0 2141.6853,674.836 L2141.6853,628.7179 L2131.6853,618.7179 L1843.31,618.7179 A7,7 0 0 0 1836.31,625.7179" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2131.6853,618.7179 L2131.6853,625.2179 A3.5,3.5 0 0 0 2135.1853,628.7179 L2141.6853,628.7179 L2131.6853,618.7179" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.7012" x="1848.147" y="637.6149">This does not erase the bounded W3 receipt.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="284.3753" x="1842.31" y="655.3209">It records stronger protocols that currently fail</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.0432" x="1852.476" y="673.027">and names the next shape-law obstruction.</text></g><g class="entity" data-qualified-name="GMN62" data-source-line="109" id="ent0063"><path d="M1498.94,99.1079 L1498.94,119.6679 L1464.4,123.6679 L1498.94,127.6679 L1498.94,148.226 A7,7 0 0 0 1505.94,155.226 L1782.0533,155.226 A7,7 0 0 0 1789.0533,148.226 L1789.0533,102.1079 L1779.0533,92.1079 L1505.94,92.1079 A7,7 0 0 0 1498.94,99.1079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1779.0533,92.1079 L1779.0533,98.6079 A3.5,3.5 0 0 0 1782.5533,102.1079 L1789.0533,102.1079 L1779.0533,92.1079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.1133" x="1504.94" y="111.0049">These topics can help readers see the route,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.3582" x="1512.3175" y="128.7109">but they are appendix/future-work unless</text><text fill="#7C2D12" font