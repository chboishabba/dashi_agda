="667.1018">MinimalCrediblePhysicsClosureShiftInstance</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.3775" x="3152.6247" y="686.1697">[current milestone]</text></g><!--entity GRBridge--><g class="entity" data-qualified-name="GRBridge" data-source-line="37" id="ent0012"><rect fill="#FEE2E2" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="226.9332" x="3102.35" y="431.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="154.9374" x="3138.3479" y="456.0339">Known-limits GR bridge</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.9332" x="3112.35" y="475.1018">KnownLimitsGRBridgeTheorem</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="166.6694" x="3132.4819" y="494.1697">[bridge, not full recovery]</text></g><!--entity QFTBridge--><g class="entity" data-qualified-name="QFTBridge" data-source-line="38" id="ent0013"><rect fill="#FEE2E2" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="234.0172" x="3098.8" y="239.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.0214" x="3134.7979" y="264.0339">Known-limits QFT bridge</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="214.0172" x="3108.8" y="283.1018">KnownLimitsQFTBridgeTheorem</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="166.6694" x="3132.4739" y="302.1697">[bridge, not full recovery]</text></g><!--entity CoreSpineSupport--><g class="entity" data-qualified-name="CoreSpineSupport" data-source-line="39" id="ent0014"><rect fill="#DBEAFE" height="134.4075" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="349.6988" x="7" y="737.4679"/><text fill="#0F172A" font-family="sans-seri