44.9679 L3346.8113,734.9679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="261.0013" x="3080.81" y="753.8649">This is the best current milestone package,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.1892" x="3123.216" y="771.5709">not a finished unified theory.</text></g><g class="entity" data-qualified-name="GMN40" data-source-line="73" id="ent0041"><path d="M3045.85,167.9679 L3045.85,195.3799 A9,9 0 0 0 3054.85,204.3799 L3376.7663,204.3799 A9,9 0 0 0 3385.7663,195.3799 L3385.7663,168.9679 L3375.7663,158.9679 L3219.81,158.9679 L3215.81,124.5179 L3211.81,158.9679 L3054.85,158.9679 A9,9 0 0 0 3045.85,167.9679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M3375.7663,158.9679 L3375.7663,164.4679 A4.5,4.5 0 0 0 3380.2663,168.9679 L3385.7663,168.9679 L3375.7663,158.9679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.9163" x="3051.85" y="177.8649">This is where the strong repo-native claim lives now.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.8932" x="3076.3615" y="195.5709">It does not erase the remaining proof gates.</text></g><g class="entity" data-qualified-name="GMN43" data-source-line="78" id="ent0044"><path d="M3666.77,568.9679 L3666.77,596.3799 A9,9 0 0 0 3675.77,605.3799 L4018.9803,605.3799 A9,9 0 0 0 4027.9803,596.3799 L4027.9803,569.9679 L4017.9803,559.9679 L3851.38,559.9679 L3847.38,525.5179 L3843.38,559.9679 L3675.77,559.9679 A9,9 0 0 0 3666.77,568.9679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M4017.9803,559.9679 L4017.9803,565.4679 A4.5,4.5 0 0 0 4022.4803,569.9679 L4027.9803,569.9679 L4017.9803,559.9679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C